<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wipulscan App Icon Generator</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0a0f19; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    canvas { border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .controls { margin-top: 20px; display: flex; gap: 12px; }
    button { padding: 12px 24px; background: linear-gradient(135deg,#7bc5ff,#00d4aa); border: none; border-radius: 12px; color: #0a0f19; font-weight: 700; cursor: pointer; font-size: 14px; }
    button:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(123,197,255,0.3); }
    h1 { color: #e8ecf1; margin-bottom: 10px; font-size: 1.5rem; }
    p { color: #9aacbf; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Wipulscan App Icon</h1>
  <p>Professionelles App-Icon für Store-Approval</p>
  <canvas id="icon" width="512" height="512"></canvas>
  <div class="controls">
    <button onclick="downloadIcon()">Download PNG (512x512)</button>
  </div>
  <script>
    const canvas = document.getElementById('icon');
    const ctx = canvas.getContext('2d');
    
    function drawIcon() {
      // Dark gradient background (matching reference image)
      const gradient = ctx.createLinearGradient(0, 0, 512, 512);
      gradient.addColorStop(0, '#0a0a0a');
      gradient.addColorStop(0.5, '#1a1a2e');
      gradient.addColorStop(1, '#0f3460');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 512, 512);
      
      // Colorful heatmap cloud as background - matching reference image
      const cloudGradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
      cloudGradient.addColorStop(0, 'rgba(255, 200, 100, 0.9)');
      cloudGradient.addColorStop(0.25, 'rgba(255, 150, 50, 0.85)');
      cloudGradient.addColorStop(0.5, 'rgba(255, 100, 150, 0.8)');
      cloudGradient.addColorStop(0.75, 'rgba(100, 150, 255, 0.6)');
      cloudGradient.addColorStop(1, 'rgba(50, 100, 200, 0)');
      ctx.fillStyle = cloudGradient;
      ctx.fillRect(0, 0, 512, 512);
      
      // WiFi symbol (three arcs + dot) - white foreground
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 20;
      ctx.lineCap = 'round';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
      ctx.shadowBlur = 20;
      
      // Outer arc
      ctx.beginPath();
      ctx.arc(256, 300, 110, Math.PI - 0.5, 0.5);
      ctx.stroke();
      
      // Middle arc
      ctx.beginPath();
      ctx.arc(256, 300, 75, Math.PI - 0.4, 0.4);
      ctx.stroke();
      
      // Inner arc
      ctx.beginPath();
      ctx.arc(256, 300, 40, Math.PI - 0.3, 0.3);
      ctx.stroke();
      
      // Center dot
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(256, 300, 18, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function downloadIcon() {
      const link = document.createElement('a');
      link.download = 'wifi-hunter-icon.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    drawIcon();
  </script>
</body>
</html>
