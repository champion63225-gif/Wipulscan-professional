t.add('show');\n  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),dur);\n}\n\n/* ── STATE ───────────────────────────────────────────── */\nconst S={\n  scanning:false,consented:false,gpsGranted:false,\n  dl:0,ul:0,lat:0,sig:-80,qual:0,netType:'—',ssid:'—',freq:0,\n  networks:[],history:[],\n  orbSize:1,scanRate:1500,showHM:true,showOrg:true,showBub:true,\n  gpsPath:[],gpsPos:null,\n  sigLog:[],dlLog:[],ulLog:[],latLog:[],netLog:[],qualLog:[],\n  prevSig:-80,\n};\n\n/* ── NETWORK API ─────────────────────────────────────── */\nconst conn = navigator.connection||navigator.mozConnection||navigator.webkitConnection||null;\nfunction readConn(){\n  if(!conn)return;\n  const dl=conn.downlink||0,ul=conn.uplink||0;\n  S.dl=dl;S.ul=ul||Math.round(dl*0.3*10)/10;\n  S.lat=conn.rtt||Math.round(20+Math.random()*30);\n  S.netType=conn.effectiveType||'—';\n}\nfunction simSignal(){\n  // Simulate realistic WiFi signal variation\n  const drift=(Math.random()-.5)*4;\n  S.sig=Math.max(-95,Math.min(-30,S.sig+drift));\n  S.freq=Math.random()>.5?5.0:2.4;\n  S.qual=Math.round(Math.max(0,Math.min(100,(S.sig+95)/65*100)));\n  S.ssid='CobraDynamics-5G';\n  if(!conn){S.dl=Math.round((10+Math.random()*80)*10)/10;S.ul=Math.round(S.dl*0.28*10)/10;S.lat=Math.round(15+Math.random()*60);}\n}\nfunction genNetworks(){\n  const names=['FritzBox-7590','DIRECT-Cobra','Telekom_12AC','Vodafone-Nachbar','CobraNet-IoT','Guest-AP','O2-HomeHS'];\n  S.networks=names.map(n=>({ssid:n,dbm:-40-Math.floor(Math.random()*55),freq:Math.random()>.5?5:2.4,ch:Math.floor(Math.random()*13)+1}));\n}\n\n/* ── WEBGL ORB HEATMAP ───────────────────────────────── */\nlet orbGL=null,orbProg=null,orbUniforms={},orbAnim=null,orbTime=0;\nconst ORB_VERT=`\nattribute vec2 pos;\nvarying vec2 vUv;\nvoid main(){vUv=pos*.5+.5;gl_Position=vec4(pos,0,1);}\n`;\nconst ORB_FRAG=`\nprecision mediump float;\nvarying vec2 vUv;\nuniform float uTime;\nuniform float uIntensity;\nuniform float uQuality;\n\n// Smooth noise\nfloat hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}\nfloat noise(vec2 p){\n  vec2 i=floor(p),f=fract(p);\n  vec2 u=f*f*(3.-2.*f);\n  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1));\n  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);\n}\nfloat fbm(vec2 p){\n  float v=0.,a=.5;\n  for(int i=0;i\u003C6;i++){v+=a*noise(p);p=p*2.+vec2(1.7,9.2);a*=.5;}\n  return v;\n}\n\nvec3 heatColor(float t){\n  // Green (good) → Yellow → Orange → Red (bad)\n  vec3 a=vec3(0.,.98,.4);   // strong signal: green\n  vec3 b=vec3(1.,.92,.0);   // medium: yellow\n  vec3 c=vec3(1.,.45,.0);   // weak: orange\n  vec3 d=vec3(1.,.08,.15);  // very weak: red\n  if(t\u003C.33) return mix(a,b,t*3.);\n  if(t\u003C.66) return mix(b,c,(t-.33)*3.);\n  return mix(c,d,(t-.66)*3.);\n}\n\nvoid main(){\n  vec2 uv=vUv*2.-1.;\n  float dist=length(uv);\n  if(dist>1.) {gl_FragColor=vec4(0);return;}\n\n  float t=uTime*.4;\n  // Organische Wolken-Bewegung\n  vec2 p=uv*1.8;\n  float n1=fbm(p+vec2(t*.3,t*.2));\n  float n2=fbm(p*1.4+vec2(-t*.2,t*.35)+n1*.6);\n  float n3=fbm(p*.9+vec2(t*.15,-t*.28)+n2*.5);\n  float cloud=n3*.55+n2*.3+n1*.15;\n\n  // Intensität basierend auf Signalstärke\n  float intensity=uIntensity; // 0=schlecht,1=gut\n  float heat=mix(1.-cloud*.6, cloud*.8+.2, intensity);\n  heat=clamp(heat,0.,1.);\n\n  vec3 col=heatColor(1.-heat*intensity-cloud*(1.-intensity)*.7);\n\n  // Rand-Vignette\n  float vign=1.-smoothstep(.7,1.,dist);\n  float edge=smoothstep(1.,.88,dist);\n\n  // Glanzeffekt (oben links)\n  vec2 hl=uv+vec2(.3,.35);\n  float gloss=exp(-dot(hl,hl)*4.5)*.28;\n  col+=gloss*vec3(1.,1.,1.);\n\n  float alpha=edge*vign*(.7+cloud*.3);\n  gl_FragColor=vec4(col*alpha,alpha);\n}\n`;\n\nfunction initOrbGL(){\n  const cv=document.getElementById('orb-cv');\n  const s=cv.parentElement.offsetWidth;\n  cv.width=s*window.devicePixelRatio;cv.height=s*window.devicePixelRatio;\n  cv.style.width=s+'px';cv.style.height=s+'px';\n  orbGL=cv.getContext('webgl',{alpha:true,premultipliedAlpha:false});\n  if(!orbGL)return;\n  const gl=orbGL;\n  function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}\n  const vs=sh(gl.VERTEX_SHADER,ORB_VERT),fs=sh(gl.FRAGMENT_SHADER,ORB_FRAG);\n  orbProg=gl.createProgram();\n  gl.attachShader(orbProg,vs);gl.attachShader(orbProg,fs);gl.linkProgram(orbProg);\n  gl.useProgram(orbProg);\n  const buf=gl.createBuffer();\n  gl.bindBuffer(gl.ARRAY_BUFFER,buf);\n  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);\n  const al=gl.getAttribLocation(orbProg,'pos');\n  gl.enableVertexAttribArray(al);gl.vertexAttribPointer(al,2,gl.FLOAT,false,0,0);\n  orbUniforms={\n    uTime:gl.getUniformLocation(orbProg,'uTime'),\n    uIntensity:gl.getUniformLocation(orbProg,'uIntensity'),\n    uQuality:gl.getUniformLocation(orbProg,'uQuality'),\n  };\n  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);\n  renderOrbGL();\n}\nfunction renderOrbGL(){\n  if(!orbGL||!orbProg)return;\n  const gl=orbGL;\n  orbTime+=0.016;\n  const intensity=S.scanning?Math.max(0.05,Math.min(1,(S.sig+95)/65)):0.05;\n  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);\n  gl.useProgram(orbProg);\n  gl.uniform1f(orbUniforms.uTime,orbTime);\n  gl.uniform1f(orbUniforms.uIntensity,intensity);\n  gl.uniform1f(orbUniforms.uQuality,S.qual/100);\n  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);\n  orbAnim=requestAnimationFrame(renderOrbGL);\n}\n\n/* ── WEBGL BACKGROUND HEATMAP ─────────────────────────── */\nlet bgGL=null,bgProg=null,bgUni={},bgAnimId=null,bgTime=0;\nconst BG_VERT=`attribute vec2 pos;varying vec2 vUv;void main(){vUv=pos*.5+.5;gl_Position=vec4(pos,0,1);}`;\nconst BG_FRAG=`\nprecision mediump float;\nvarying vec2 vUv;\nuniform float uTime;\nuniform float uIntensity;\n\nfloat hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}\nfloat noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1)),u.x),u.y);}\nfloat fbm(vec2 p){float v=0.,a=.5;for(int i=0;i\u003C4;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}\n\nvoid main(){\n  vec2 uv=vUv;\n  float t=uTime*.15;\n  float n=fbm(uv*2.5+vec2(t,t*.7));\n  float glow=n*.15*uIntensity;\n  // Subtle floating cloud blobs in background\n  vec3 col=vec3(0.,.04,.12)*glow+vec3(.02,.0,.05)*fbm(uv*3.+t)*.1*uIntensity;\n  gl_FragColor=vec4(col,glow*.4);\n}\n`;\nfunction initBgGL(){\n  const cv=document.getElementById('glcv');\n  cv.width=window.innerWidth;cv.height=window.innerHeight;\n  bgGL=cv.getContext('webgl',{alpha:true,premultipliedAlpha:false});\n  if(!bgGL)return;\n  const gl=bgGL;\n  function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}\n  bgProg=gl.createProgram();\n  gl.attachShader(bgProg,sh(gl.VERTEX_SHADER,BG_VERT));\n  gl.attachShader(bgProg,sh(gl.FRAGMENT_SHADER,BG_FRAG));\n  gl.linkProgram(bgProg);gl.useProgram(bgProg);\n  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);\n  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);\n  const al=gl.getAttribLocation(bgProg,'pos');\n  gl.enableVertexAttribArray(al);gl.vertexAttribPointer(al,2,gl.FLOAT,false,0,0);\n  bgUni={uTime:gl.getUniformLocation(bgProg,'uTime'),uIntensity:gl.getUniformLocation(bgProg,'uIntensity')};\n  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);\n  renderBgGL();\n}\nfunction renderBgGL(){\n  if(!bgGL)return;\n  bgTime+=0.016;\n  const gl=bgGL;\n  gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);\n  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);\n  gl.useProgram(bgProg);\n  gl.uniform1f(bgUni.uTime,bgTime);\n  gl.uniform1f(bgUni.uIntensity,S.scanning?1:0);\n  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);\n  bgAnimId=requestAnimationFrame(renderBgGL);\n}\n\n/* ── 2D CANVAS (particles, bubbles, GPS path) ─────────── */\nlet cv2=null,ctx2=null,particles=[],floatBubbles=[],animId=null;\nfunction init2D(){\n  cv2=document.getElementById('cv');\n  ctx2=cv2.getContext('2d');\n  resize2D();\n  window.addEventListener('resize',resize2D);\n  for(let i=0;i\u003C55;i++)particles.push(mkParticle());\n  for(let i=0;i\u003C8;i++)floatBubbles.push(mkFloatBubble());\n  cv2.addEventListener('click',onCanvasClick);\n  loop2D();\n}\nfunction resize2D(){\n  const dpr=window.devicePixelRatio||1;\n  cv2.width=window.innerWidth*dpr;cv2.height=window.innerHeight*dpr;\n  cv2.style.width=window.innerWidth+'px';cv2.style.height=window.innerHeight+'px';\n  ctx2.scale(dpr,dpr);\n}\nfunction mkParticle(){\n  return{x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,\n    vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,\n    r:Math.random()*2+.5,alpha:Math.random()*.5+.1,\n    color:`hsl(${[160,45,200,280][Math.floor(Math.random()*4)]},80%,60%)`};\n}\nfunction mkFloatBubble(){\n  const angle=Math.random()*Math.PI*2;\n  const orb=document.getElementById('scan-btn');\n  const orbR=(orb.offsetWidth/2+50)*S.orbSize;\n  const dist=orbR+Math.random()*90;\n  const cx=window.innerWidth/2,cy=orbCenterY();\n  const colors=[\n    ['#00ff88','rgba(0,255,136,'],\n    ['#ffe000','rgba(255,224,0,'],\n    ['#ff4422','rgba(255,68,34,'],\n    ['#00cfff','rgba(0,207,255,'],\n    ['#ff8800','rgba(255,136,0,'],\n  ];\n  const c=colors[Math.floor(Math.random()*colors.length)];\n  return{\n    x:cx+Math.cos(angle)*dist,y:cy+Math.sin(angle)*dist,\n    angle,dist:dist+Math.random()*40,\n    r:Math.random()*18+8,\n    speed:(Math.random()-.5)*.006,\n    col:c[0],glowCol:c[1],\n    alpha:.7+Math.random()*.3,\n    t:Math.random()*Math.PI*2,\n    cloudPts:genCloudPts(8+Math.floor(Math.random()*5))\n  };\n}\nfunction orbCenterY(){\n  const btn=document.getElementById('scan-btn');\n  if(!btn)return window.innerHeight/2;\n  const r=btn.getBoundingClientRect();\n  return r.top+r.height/2;\n}\nfunction genCloudPts(n){\n  const pts=[];\n  for(let i=0;i\u003Cn;i++){\n    const a=(i/n)*Math.PI*2;\n    const rr=.6+Math.random()*.7;\n    pts.push({a,r:rr,drift:(Math.random()-.5)*.003});\n  }\n  return pts;\n}\nfunction drawOrganicCloud(ctx,x,y,baseR,pts,t,colStart,alpha){\n  ctx.save();\n  ctx.globalAlpha=alpha;\n  // Glow\n  const grd=ctx.createRadialGradient(x,y,0,x,y,baseR*2.5);\n  grd.addColorStop(0,colStart+'0.35)');\n  grd.addColorStop(.5,colStart+'0.12)');\n  grd.addColorStop(1,colStart+'0)');\n  ctx.fillStyle=grd;\n  ctx.beginPath();ctx.arc(x,y,baseR*2.5,0,Math.PI*2);ctx.fill();\n\n  // Organische Form\n  ctx.beginPath();\n  for(let i=0;i\u003C=pts.length;i++){\n    const p=pts[i%pts.length];\n    const wave=Math.sin(t*1.2+p.a*2)*0.15;\n    const rr=(p.r+wave)*baseR;\n    const px=x+Math.cos(p.a+t*0.08)*rr;\n    const py=y+Math.sin(p.a+t*0.08)*rr;\n    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);\n  }\n  ctx.closePath();\n  const fg=ctx.createRadialGradient(x-baseR*.2,y-baseR*.2,0,x,y,baseR);\n  fg.addColorStop(0,colStart+'0.9)');\n  fg.addColorStop(.6,colStart+'0.6)');\n  fg.addColorStop(1,colStart+'0.2)');\n  ctx.fillStyle=fg;\n  ctx.fill();\n  ctx.restore();\n}\nfunction loop2D(){\n  animId=requestAnimationFrame(loop2D);\n  if(!ctx2)return;\n  const W=window.innerWidth,H=window.innerHeight;\n  ctx2.clearRect(0,0,W,H);\n\n  const t=Date.now()/1000;\n\n  // Particles\n  if(S.scanning){\n    particles.forEach(p=>{\n      p.x+=p.vx;p.y+=p.vy;\n      if(p.x\u003C0||p.x>W)p.vx*=-1;\n      if(p.y\u003C0||p.y>H)p.vy*=-1;\n      ctx2.save();ctx2.globalAlpha=p.alpha*.6;\n      ctx2.fillStyle=p.color;\n      ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);ctx2.fill();\n      ctx2.restore();\n    });\n  }\n\n  // GPS path\n  if(S.gpsPath.length>1){\n    ctx2.save();\n    ctx2.strokeStyle='rgba(0,207,255,0.45)';ctx2.lineWidth=2;\n    ctx2.setLineDash([6,10]);ctx2.beginPath();\n    S.gpsPath.forEach((pt,i)=>i===0?ctx2.moveTo(pt.x,pt.y):ctx2.lineTo(pt.x,pt.y));\n    ctx2.stroke();ctx2.restore();\n  }\n\n  // Floating bubbles (außerhalb Orb)\n  if(S.showBub&&S.scanning){\n    floatBubbles.forEach(b=>{\n      b.t+=b.speed*50;\n      b.angle+=b.speed;\n      b.cloudPts.forEach(p=>p.a+=p.drift);\n      const cx=W/2,cy=orbCenterY();\n      const nx=cx+Math.cos(b.angle)*b.dist;\n      const ny=cy+Math.sin(b.angle)*b.dist;\n      drawOrganicCloud(ctx2,nx,ny,b.r,b.cloudPts,b.t,b.glowCol,b.alpha*.55);\n    });\n  }\n}\nfunction onCanvasClick(e){\n  if(!S.scanning)return;\n  const r=cv2.getBoundingClientRect();\n  const x=e.clientX-r.left,y=e.clientY-r.top;\n  const btn=document.getElementById('scan-btn');\n  const br=btn.getBoundingClientRect();\n  const cx=br.left+br.width/2,cy=br.top+br.height/2;\n  const dx=x-cx,dy=y-cy;\n  if(Math.sqrt(dx*dx+dy*dy)>br.width*0.8){\n    // Bubble wurde geklickt — Detail zeigen\n    showBDetail();\n  }\n}\n\n/* ── SPARKLINES ──────────────────────────────────────── */\nfunction drawSpark(id,data,color='rgba(212,175,55,0.8)'){\n  const cv=document.getElementById(id);if(!cv)return;\n  const ctx=cv.getContext('2d');\n  const W=cv.offsetWidth||80,H=cv.offsetHeight||22;\n  cv.width=W;cv.height=H;ctx.clearRect(0,0,W,H);\n  if(data.length\u003C2)return;\n  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;\n  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin='round';\n  ctx.beginPath();\n  data.forEach((v,i)=>{\n    const x=(i/(data.length-1))*W;\n    const y=H-(v-mn)/rng*(H-2)-1;\n    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);\n  });\n  ctx.stroke();\n  // Fill\n  const grd=ctx.createLinearGradient(0,0,0,H);\n  grd.addColorStop(0,color.replace('0.8','0.18'));grd.addColorStop(1,'transparent');\n  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=grd;ctx.fill();\n}\n\n/* ── METRICS UI UPDATE ────────────────────────────────── */\nfunction qualColor(q){if(q>=75)return 'g';if(q>=45)return 'o';if(q>=20)return 'a';return 'r';}\nfunction sigColor(s){if(s>=-60)return 'g';if(s>=-70)return 'o';if(s>=-80)return 'a';return 'r';}\n\nfunction updateUI(){\n  const sc=sigColor(S.sig),qc=qualColor(S.qual);\n  document.getElementById('mv-sig').className='mv '+sc;\n  document.getElementById('mv-sig').textContent=S.sig;\n  document.getElementById('mv-dl').className='mv '+(S.dl>20?'g':S.dl>5?'o':'a');\n  document.getElementById('mv-dl').textContent=S.dl.toFixed(1);\n  document.getElementById('mv-ul').className='mv '+(S.ul>5?'g':'o');\n  document.getElementById('mv-ul').textContent=S.ul.toFixed(1);\n  document.getElementById('mv-lat').className='mv '+(S.lat\u003C30?'g':S.lat\u003C80?'o':'r');\n  document.getElementById('mv-lat').textContent=S.lat;\n  document.getElementById('mv-net').textContent=S.networks.length||'—';\n  document.getElementById('mv-qual').className='mv '+qc;\n  document.getElementById('mv-qual').textContent=S.qual;\n\n  // Orb\n  document.getElementById('orb-val').textContent=S.dl.toFixed(0)||'—';\n  document.getElementById('orb-dbm').textContent=S.sig+' dBm';\n\n  // SSID Badge\n  const bi=document.getElementById('badge-inner');\n  bi.textContent=S.ssid;bi.className=S.ssid!=='—'?'on':'off';\n  document.getElementById('tb-conn').textContent=S.netType.toUpperCase()||'—';\n\n  // Metric card live class\n  ['mc-sig','mc-dl','mc-ul','mc-lat','mc-net','mc-qual'].forEach(id=>{\n    const el=document.getElementById(id);if(el)el.classList.toggle('live',S.scanning);\n  });\n\n  // Logs\n  S.sigLog.push(S.sig);S.dlLog.push(S.dl);S.ulLog.push(S.ul);\n  S.latLog.push(S.lat);S.qualLog.push(S.qual);S.netLog.push(S.networks.length);\n  const MAX=80;\n  [S.sigLog,S.dlLog,S.ulLog,S.latLog,S.qualLog,S.netLog].forEach(a=>{if(a.length>MAX)a.shift();});\n  S.history.push({sig:S.sig,dl:S.dl,lat:S.lat,ts:Date.now()});\n  if(S.history.length>300)S.history.shift();\n\n  // Sparklines\n  drawSpark('sp-sig',S.sigLog,sigColor(S.sig)==='g'?'rgba(0,255,136,.8)':sigColor(S.sig)==='a'?'rgba(255,136,0,.8)':'rgba(255,34,68,.8)');\n  drawSpark('sp-dl',S.dlLog,'rgba(212,175,55,.8)');\n  drawSpark('sp-ul',S.ulLog,'rgba(212,175,55,.6)');\n  drawSpark('sp-lat',S.latLog,'rgba(0,207,255,.8)');\n  drawSpark('sp-qual',S.qualLog,qualColor(S.qual)==='g'?'rgba(0,255,136,.8)':'rgba(255,136,0,.8)');\n  drawSpark('sp-net',S.netLog,'rgba(168,85,247,.8)');\n}\n\n/* ── SCAN LOOP ─────────────────────────────────────────── */\nlet scanInterval=null;\nfunction toggleScan(){\n  S.scanning=!S.scanning;\n  const btn=document.getElementById('scan-btn');\n  const lbl=document.getElementById('btn-lbl');\n  const icon=document.getElementById('orb-icon');\n  if(S.scanning){\n    btn.classList.add('on');\n    lbl.textContent='STOPPEN';\n    icon.textContent='📶';\n    setStatus(T('scanning'));\n    readConn();simSignal();genNetworks();updateUI();\n    scanInterval=setInterval(()=>{\n      if(!S.scanning)return;\n      readConn();simSignal();genNetworks();updateUI();\n    },S.scanRate);\n    toast('🔍 Scan gestartet');\n  }else{\n    clearInterval(scanInterval);\n    btn.classList.remove('on');\n    lbl.textContent='SCAN STARTEN';\n    icon.textContent='📡';\n    setStatus(T('stopped'));\n    toast('⏹ Scan gestoppt');\n  }\n}\nfunction setStatus(msg){document.getElementById('smsg').textContent=msg;}\n\n/* ── CLOCK ─────────────────────────────────────────────── */\nfunction tickClock(){\n  const d=new Date();\n  document.getElementById('tb-clock').textContent=\n    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');\n}\nsetInterval(tickClock,1000);tickClock();\n\n/* ── DETAIL / RADAR / HISTORY ──────────────────────────── */\nfunction showBDetail(){\n  document.getElementById('bd-sig').textContent=S.sig;\n  document.getElementById('bd-qual').textContent=S.qual+'%';\n  document.getElementById('bd-dl').textContent=S.dl.toFixed(1);\n  document.getElementById('bd-lat').textContent=S.lat;\n  document.getElementById('bdetail-name').textContent=S.ssid;\n  document.getElementById('bdetail-dbm').textContent=S.sig+' dBm · '+S.freq+' GHz';\n  // Sparkline\n  const cv=document.getElementById('bdetail-spark');\n  const ctx=cv.getContext('2d');\n  const W=cv.offsetWidth||300,H=52;cv.width=W;cv.height=H;\n  ctx.clearRect(0,0,W,H);\n  if(S.sigLog.length>2){\n    const d=S.sigLog.slice(-60);\n    const mn=Math.min(...d),mx=Math.max(...d),rng=mx-mn||1;\n    const grd=ctx.createLinearGradient(0,0,W,0);\n    grd.addColorStop(0,'rgba(255,34,68,.6)');grd.addColorStop(.5,'rgba(255,200,0,.8)');grd.addColorStop(1,'rgba(0,255,136,.8)');\n    ctx.strokeStyle=grd;ctx.lineWidth=2;ctx.lineJoin='round';\n    ctx.beginPath();\n    d.forEach((v,i)=>{\n      const x=(i/(d.length-1))*W;const y=H-(v-mn)/rng*(H-4)-2;\n      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);\n    });ctx.stroke();\n  }\n  document.getElementById('bdetail').classList.add('open');\n}\nfunction closeBDetail(){document.getElementById('bdetail').classList.remove('open');}\n\n/* ── RADAR ──────────────────────────────────────────────── */\nlet radarAnim=null,radarAngle=0;\nfunction openRadar(){\n  document.getElementById('radar-overlay').classList.add('open');\n  genNetworks();buildRadarList();\n  startRadar();\n}\nfunction closeRadar(){\n  document.getElementById('radar-overlay').classList.remove('open');\n  cancelAnimationFrame(radarAnim);\n}\nfunction startRadar(){\n  const cv=document.getElementById('radar-cv');\n  const size=cv.offsetWidth||320;cv.width=size;cv.height=size;\n  const ctx=cv.getContext('2d');\n  function frame(){\n    radarAnim=requestAnimationFrame(frame);\n    const W=size,H=size,cx=W/2,cy=H/2,R=W/2-10;\n    ctx.clearRect(0,0,W,H);\n    // Grid rings\n    for(let i=1;i\u003C=4;i++){\n      ctx.strokeStyle=`rgba(0,255,100,${.04+i*.03})`;ctx.lineWidth=.8;\n      ctx.beginPath();ctx.arc(cx,cy,R*i/4,0,Math.PI*2);ctx.stroke();\n    }\n    // Cross lines\n    ctx.strokeStyle='rgba(0,255,100,.06)';ctx.lineWidth=.5;\n    ctx.beginPath();ctx.moveTo(cx-R,cy);ctx.lineTo(cx+R,cy);\n    ctx.moveTo(cx,cy-R);ctx.lineTo(cx,cy+R);ctx.stroke();\n    // Scan sweep\n    radarAngle=(radarAngle+0.028)%(Math.PI*2);\n    const sweep=ctx.createConicalGradient?null:null;\n    const grd=ctx.createLinearGradient(cx,cy,cx+Math.cos(radarAngle)*R,cy+Math.sin(radarAngle)*R);\n    grd.addColorStop(0,'rgba(0,255,100,0.35)');grd.addColorStop(1,'rgba(0,255,100,0)');\n    ctx.save();ctx.beginPath();\n    ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,radarAngle-0.7,radarAngle);ctx.closePath();\n    ctx.fillStyle=grd;ctx.fill();ctx.restore();\n    // Sweep line\n    ctx.strokeStyle='rgba(0,255,100,0.9)';ctx.lineWidth=1.5;\n    ctx.beginPath();ctx.moveTo(cx,cy);\n    ctx.lineTo(cx+Math.cos(radarAngle)*R,cy+Math.sin(radarAngle)*R);ctx.stroke();\n    // Network dots\n    S.networks.forEach((n,i)=>{\n      const a=(i/S.networks.length)*Math.PI*2+0.3;\n      const strength=(n.dbm+95)/65;\n      const d=R*(0.2+strength*.75);\n      const x=cx+Math.cos(a)*d,y=cy+Math.sin(a)*d;\n      const col=strength>.7?'#00ff88':strength>.4?'#ffe000':'#ff4422';\n      const grd2=ctx.createRadialGradient(x,y,0,x,y,8);\n      grd2.addColorStop(0,col);grd2.addColorStop(1,'transparent');\n      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle=grd2;ctx.fill();\n      ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();\n    });\n    // Center dot\n    const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,8);\n    cg.addColorStop(0,'rgba(0,207,255,1)');cg.addColorStop(1,'transparent');\n    ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();\n    ctx.beginPath();ctx.arc(cx,cy,2,0,Math.PI*2);ctx.fillStyle='#00cfff';ctx.fill();\n  }\n  frame();\n}\nfunction buildRadarList(){\n  const el=document.getElementById('radar-list');el.innerHTML='';\n  [...S.networks].sort((a,b)=>b.dbm-a.dbm).forEach(n=>{\n    const pct=Math.round(Math.max(0,Math.min(100,(n.dbm+95)/65*100)));\n    const col=pct>70?'var(--green)':pct>40?'var(--gold)':'var(--red)';\n    const div=document.createElement('div');div.className='rl-item';\n    div.innerHTML=`\n      \u003Cdiv>\n        \u003Cdiv class=\"rl-ssid\">${n.ssid}\u003C/div>\n        \u003Cdiv class=\"rl-meta\">${n.freq} GHz · Kanal ${n.ch}\u003C/div>\n        \u003Cdiv class=\"rl-bar-wrap\">\u003Cdiv class=\"rl-bar\" style=\"width:${pct}%;background:${col}\">\u003C/div>\u003C/div>\n      \u003C/div>\n      \u003Cdiv class=\"rl-right\">\n        \u003Cdiv class=\"rl-dbm\" style=\"color:${col}\">${n.dbm} dBm\u003C/div>\n      \u003C/div>`;\n    div.onclick=()=>toast('📡 '+n.ssid+' · '+n.dbm+' dBm');\n    el.appendChild(div);\n  });\n}\n\n/* ── HISTORY CHART ──────────────────────────────────────── */\nfunction openHistory(){\n  document.getElementById('history-overlay').classList.add('open');\n  drawHistoryChart();\n}\nfunction closeHistory(){document.getElementById('history-overlay').classList.remove('open');}\nfunction drawHistoryChart(){\n  const cv=document.getElementById('hist-cv');\n  const W=cv.offsetWidth||window.innerWidth-40,H=220;\n  cv.width=W;cv.height=H;\n  const ctx=cv.getContext('2d');\n  ctx.clearRect(0,0,W,H);\n  const data=S.sigLog.length?S.sigLog:[...Array(20)].map(()=>-80+Math.random()*20);\n  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;\n  // Grid\n  for(let i=0;i\u003C=4;i++){\n    const y=H-(i/4)*(H-20)-10;\n    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;\n    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();\n    ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='8px Space Mono,monospace';\n    ctx.fillText(Math.round(mn+(rng*i/4)),4,y-2);\n  }\n  // Gradient fill\n  const grd=ctx.createLinearGradient(0,0,0,H);\n  grd.addColorStop(0,'rgba(212,175,55,.35)');grd.addColorStop(1,'rgba(212,175,55,.02)');\n  ctx.beginPath();\n  data.forEach((v,i)=>{const x=(i/(data.length-1))*W;const y=H-(v-mn)/rng*(H-20)-10;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});\n  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=grd;ctx.fill();\n  // Line\n  const lg=ctx.createLinearGradient(0,0,W,0);\n  lg.addColorStop(0,'rgba(255,34,68,.9)');lg.addColorStop(.5,'rgba(255,200,0,.9)');lg.addColorStop(1,'rgba(0,255,136,.9)');\n  ctx.strokeStyle=lg;ctx.lineWidth=2.5;ctx.lineJoin='round';\n  ctx.beginPath();\n  data.forEach((v,i)=>{const x=(i/(data.length-1))*W;const y=H-(v-mn)/rng*(H-20)-10;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});\n  ctx.stroke();\n  // Stats\n  const avg=Math.round(data.reduce((a,b)=>a+b,0)/data.length);\n  document.getElementById('hs-min').textContent=Math.round(mn);\n  document.getElementById('hs-avg').textContent=avg;\n  document.getElementById('hs-max').textContent=Math.round(mx);\n}\n\n/* ── SETTINGS ────────────────────────────────────────────── */\nfunction openSettings(){document.getElementById('settings').classList.add('open');}\nfunction closeSettings(){document.getElementById('settings').classList.remove('open');}\nfunction openInfo(){document.getElementById('info-overlay').classList.add('open');}\nfunction closeInfo(){document.getElementById('info-overlay').classList.remove('open');}\n\n/* ── GPS ─────────────────────────────────────────────────── */\nfunction requestGPS(){\n  navigator.geolocation.watchPosition(p=>{\n    S.gpsPos={lat:p.coords.latitude,lng:p.coords.longitude};\n    S.gpsGranted=true;\n    document.getElementById('gps-permit').classList.remove('open');\n    toast('📍 GPS aktiv');\n  },()=>{skipGPS();},{enableHighAccuracy:true,maximumAge:5000});\n}\nfunction skipGPS(){\n  document.getElementById('gps-permit').classList.remove('open');\n}\n\n/* ── CONSENT + LAUNCH ─────────────────────────────────────── */\nfunction acceptConsent(){\n  S.consented=true;localStorage.setItem('wps_consent','1');\n  document.getElementById('consent').style.display='none';\n  showGPS();\n}\nfunction showGPS(){\n  document.getElementById('gps-permit').classList.add('open');\n}\nfunction showApp(){\n  document.getElementById('app').style.display='flex';\n  document.getElementById('tap-start').style.display='none';\n  setFilterBar();\n  setSigLegendPos();\n  setActionBtnPositions();\n  if(!conn)setStatus(T('noapi'));\n  initOrbGL();\n  initBgGL();\n  init2D();\n  toast('👋 Willkommen bei WIPULSCAN PRO v6.0');\n}\n\nfunction setFilterBar(){\n  const fb=document.getElementById('filterbar');fb.innerHTML='';\n  const items=[['ALL','Alle'],['5G','5 GHz'],['2.4G','2.4 GHz'],['SAVED','Bekannte'],['WEAK','Schwache']];\n  items.forEach(([v,l],i)=>{\n    const b=document.createElement('button');b.className='fb'+(i===0?' on':'');\n    b.textContent=l;b.onclick=()=>{fb.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');toast('🔍 Filter: '+l);};\n    fb.appendChild(b);\n  });\n}\nfunction setSigLegendPos(){\n  const topbar=document.getElementById('topbar');\n  const tbH=topbar.offsetHeight||60;\n  const metr=document.getElementById('metrics');\n  const mH=metr.offsetHeight||140;\n  const leg=document.getElementById('sig-legend');\n  leg.style.top=(tbH+20)+'px';\n  leg.style.bottom=(mH+20)+'px';\n  const barH=Math.max(80,window.innerHeight-tbH-mH-100);\n  document.getElementById('sig-legend-bar').style.height=barH+'px';\n}\nfunction setActionBtnPositions(){\n  const topbar=document.getElementById('topbar');\n  const tbH=topbar.offsetHeight||60;\n  const metr=document.getElementById('metrics');\n  const mH=metr.offsetHeight||140;\n  const smsg=document.getElementById('smsg');\n  smsg.style.top=(tbH+16)+'px';\n  const fb=document.getElementById('filterbar');\n  fb.style.top=(tbH+46)+'px';\n  const fset=document.getElementById('f-set');\n  fset.style.top=(tbH+14)+'px';\n  const infob=document.getElementById('info-btn');\n  infob.style.top=(tbH+14)+'px';\n  const radarbtn=document.getElementById('radar-btn');\n  const histbtn=document.getElementById('hist-btn');\n  const btnBottom=mH+84;\n  radarbtn.style.cssText=`left:14px;bottom:${btnBottom}px;display:flex;`;\n  histbtn.style.cssText=`right:14px;bottom:${btnBottom}px;display:flex;`;\n  const legend=document.getElementById('sig-legend');\n  legend.style.top=(tbH+54)+'px';\n}\n\n/* ── TAP TO START ─────────────────────────────────────────── */\nfunction tapToStart(){\n  document.getElementById('tap-start').style.display='none';\n  if(navigator.geolocation&&!S.gpsGranted){showGPS();}\n  else{showApp();}\n}\n\n/* ── INTRO SEQUENCE ───────────────────────────────────────── */\n(function initIntro(){\n  const barW=document.getElementById('intro-bar');\n  const barWrap=document.getElementById('intro-bar-wrap');\n  const pct=document.getElementById('intro-pct');\n  const foot=document.getElementById('intro-foot');\n  const pre=document.getElementById('il-pre');\n  const brand=document.getElementById('il-brand');\n  const sub=document.getElementById('il-sub');\n  const desc=document.getElementById('il-desc');\n  const flash=document.getElementById('intro-flash');\n  const icv=document.getElementById('icv');\n\n  // Intro particles on canvas\n  const ictx=icv.getContext('2d');\n  icv.width=window.innerWidth;icv.height=window.innerHeight;\n  const ipts=Array.from({length:80},()=>({\n    x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,\n    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,\n    r:Math.random()*2.5+.5,\n    hue:Math.random()>0.5?45:160,\n    alpha:Math.random()*.4+.1\n  }));\n  let introRunning=true;\n  (function iloop(){\n    if(!introRunning)return;requestAnimationFrame(iloop);\n    ictx.clearRect(0,0,icv.width,icv.height);\n    ipts.forEach(p=>{\n      p.x+=p.vx;p.y+=p.vy;\n      if(p.x\u003C0||p.x>icv.width)p.vx*=-1;\n      if(p.y\u003C0||p.y>icv.height)p.vy*=-1;\n      ictx.save();ictx.globalAlpha=p.alpha;\n      ictx.fillStyle=`hsl(${p.hue},80%,65%)`;\n      ictx.beginPath();ictx.arc(p.x,p.y,p.r,0,Math.PI*2);ictx.fill();\n      ictx.restore();\n    });\n  })();\n\n  // Timeline\n  const consented=localStorage.getItem('wps_consent')==='1';\n  setTimeout(()=>pre.classList.add('vis','fast'),300);\n  setTimeout(()=>{brand.classList.add('shoot');flash.classList.add('burst');},900);\n  setTimeout(()=>{sub.classList.add('vis','fast');},1700);\n  setTimeout(()=>{desc.
