uppercase;}\n.cc-h{font-size:15px;font-weight:600;color:#fff;text-align:center;margin-bottom:10px;}\n.cc-p{font-size:11px;color:rgba(255,255,255,.45);line-height:1.6;text-align:center;margin-bottom:18px;}\n.lang-row{display:flex;gap:6px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}\nbody[dir=rtl] .lang-row{direction:ltr;}\nbody[dir=rtl] #topbar,body[dir=rtl] #metrics,body[dir=rtl] #smsg{direction:rtl;text-align:right;}\nbody[dir=rtl] .sr{flex-direction:row-reverse;}\nbody[dir=rtl] #filterbar{direction:rtl;}\n.lb{font-family:var(--font-data);font-size:9px;letter-spacing:.18em;\n  padding:5px 14px;border-radius:20px;border:1px solid rgba(212,175,55,.25);\n  background:transparent;color:rgba(212,175,55,.5);cursor:pointer;transition:all .2s;text-transform:uppercase;}\n.lb.on,.lb:hover{background:rgba(212,175,55,.1);border-color:var(--gold);color:var(--gold);}\n.legal{max-height:120px;overflow-y:auto;background:rgba(0,0,0,.3);\n  border:1px solid rgba(212,175,55,.08);border-radius:10px;\n  padding:10px 12px;margin-bottom:16px;font-size:9.5px;\n  color:rgba(255,255,255,.32);line-height:1.75;white-space:pre-wrap;\n  scrollbar-width:thin;scrollbar-color:rgba(212,175,55,.25) transparent;}\n.chk-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;}\n.chk-row input{width:17px;height:17px;flex-shrink:0;accent-color:var(--gold);margin-top:2px;cursor:pointer;}\n.chk-row label{font-size:10.5px;color:rgba(255,255,255,.55);line-height:1.5;cursor:pointer;}\n.cta{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;\n  font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;\n  background:linear-gradient(135deg,var(--gold-dk),var(--gold) 50%,var(--gold-lt));\n  color:var(--ink);box-shadow:0 4px 28px rgba(212,175,55,.22);transition:opacity .2s,transform .15s;}\n.cta:disabled{opacity:.3;cursor:not-allowed;}\n.cta:not(:disabled):active{transform:scale(.97);}\n\n/* ── APP ────────────────────────────────────────────────── */\n#app{position:fixed;inset:0;display:none;flex-direction:column;background:var(--deep);}\n#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair;}\n\n/* TOP BAR */\n#topbar{\n  position:absolute;top:0;left:0;right:0;z-index:100;\n  padding:calc(var(--st) + 10px) 16px 10px;\n  display:flex;align-items:center;justify-content:space-between;\n  background:linear-gradient(180deg,rgba(0,0,10,.96) 0%,transparent 100%);\n  pointer-events:none;\n}\n#tb-logo{font-family:var(--font-ui);font-size:16px;font-weight:700;letter-spacing:.18em;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#tb-conn{font-family:var(--font-data);font-size:8px;letter-spacing:.18em;color:rgba(212,175,55,.4);text-transform:uppercase;}\n\n/* BADGE */\n#badge{position:absolute;top:0;left:50%;transform:translateX(-50%);padding:calc(var(--st)+10px) 0 0;z-index:101;}\n#badge-inner{\n  font-family:var(--font-data);font-size:8px;letter-spacing:.28em;color:rgba(212,175,55,.45);\n  text-transform:uppercase;padding:4px 14px;border-radius:20px;\n  border:1px solid rgba(212,175,55,.12);background:rgba(0,0,10,.6);\n  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all .4s;\n}\n#badge-inner.on{color:var(--gold);border-color:rgba(212,175,55,.32);}\n#badge-inner.off{color:var(--amber);}\n\n/* SCAN BUTTON */\n#scan-btn{\n  position:absolute;left:50%;transform:translateX(-50%);\n  bottom:calc(var(--sb) + 128px);\n  width:clamp(130px,38vw,170px);height:clamp(130px,38vw,170px);\n  border-radius:50%;border:none;cursor:pointer;z-index:110;\n  background:radial-gradient(ellipse at 36% 30%,rgba(245,224,112,.12) 0%,#000 65%);\n  box-shadow:0 0 0 1px rgba(212,175,55,.2),0 0 0 6px rgba(212,175,55,.04),0 8px 40px rgba(0,0,0,.85),inset 0 1px 0 rgba(212,175,55,.12);\n  transition:box-shadow .35s,transform .15s;-webkit-tap-highlight-color:transparent;\n}\n#scan-btn:active{transform:translateX(-50%) scale(.95);}\n@keyframes pulse-ring{\n  0%  {box-shadow:0 0 0 1px rgba(212,175,55,.5),0 0 0 6px rgba(212,175,55,.08),0 0 36px rgba(212,175,55,.16),0 8px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(212,175,55,.18);}\n  60% {box-shadow:0 0 0 1px rgba(212,175,55,.4),0 0 0 18px rgba(212,175,55,.0),0 0 52px rgba(212,175,55,.12),0 8px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(212,175,55,.18);}\n  100%{box-shadow:0 0 0 1px rgba(212,175,55,.5),0 0 0 6px rgba(212,175,55,.08),0 0 36px rgba(212,175,55,.16),0 8px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(212,175,55,.18);}\n}\n#scan-btn.on{animation:pulse-ring 2.2s ease-in-out infinite;}\n#orb{position:absolute;inset:14px;border-radius:50%;overflow:hidden;\n  background:radial-gradient(ellipse at 38% 30%,rgba(245,224,112,.06) 0%,rgba(0,0,8,.97) 70%);\n  border:1px solid rgba(212,175,55,.1);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;}\n#orb-val{font-family:var(--font-data);font-size:clamp(24px,7.5vw,32px);font-weight:700;color:var(--gold);line-height:1;}\n#orb-unit{font-family:var(--font-data);font-size:8px;color:rgba(212,175,55,.4);letter-spacing:.2em;margin-top:2px;}\n#orb-dbm{font-family:var(--font-data);font-size:9px;color:rgba(255,255,255,.28);margin-top:5px;}\n#btn-icon{font-size:clamp(20px,6vw,28px);display:block;line-height:1;margin-bottom:1px;}\n#btn-lbl{font-family:var(--font-ui);font-size:clamp(9px,2.2vw,11px);font-weight:700;\n  letter-spacing:.16em;color:var(--gold);text-transform:uppercase;display:block;margin-top:5px;}\n\n/* METRICS */\n#metrics{\n  position:absolute;bottom:0;left:0;right:0;z-index:100;\n  padding:12px 12px calc(var(--sb)+12px);\n  background:linear-gradient(0deg,rgba(0,0,10,.97) 0%,rgba(0,0,10,.7) 60%,transparent 100%);\n}\n.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}\n.mc{\n  background:rgba(255,255,255,.022);border:1px solid rgba(212,175,55,.07);\n  border-radius:10px;padding:9px 7px 7px;text-align:center;\n  position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s;\n}\n.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;\n  background:linear-gradient(90deg,transparent,rgba(212,175,55,.22),transparent);}\n.mc.live{border-color:rgba(212,175,55,.22);box-shadow:0 0 12px rgba(212,175,55,.04);}\n.ml{font-family:var(--font-data);font-size:7.5px;letter-spacing:.22em;\n  color:rgba(212,175,55,.4);text-transform:uppercase;margin-bottom:4px;}\n.mv{font-family:var(--font-data);font-size:clamp(17px,4.8vw,23px);font-weight:700;color:var(--gold);line-height:1;}\n.mv.g{color:var(--green);}.mv.o{color:var(--gold);}.mv.a{color:var(--amber);}.mv.r{color:var(--red);}\n.mu{font-size:8px;color:rgba(255,255,255,.28);margin-top:2px;}\n\n/* LEGEND */\n#legend{position:absolute;right:12px;z-index:100;}\n.li{display:flex;align-items:center;gap:5px;margin-bottom:5px;}\n.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;}\n.ll{font-family:var(--font-data);font-size:7.5px;letter-spacing:.1em;color:rgba(255,255,255,.38);}\n\n/* STATUS MSG */\n#smsg{position:absolute;left:50%;transform:translateX(-50%);z-index:105;\n  font-family:var(--font-ui);font-size:clamp(10px,2.5vw,11.5px);\n  color:rgba(255,255,255,.38);letter-spacing:.05em;text-align:center;\n  width:min(280px,76vw);pointer-events:none;transition:opacity .5s;}\n\n/* GEAR + INFO BUTTONS */\n#f-set,#info-btn{\n  position:absolute;z-index:120;\n  width:42px;height:42px;border-radius:50%;\n  border:1px solid rgba(212,175,55,.18);background:rgba(0,0,10,.72);\n  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);\n  display:flex;align-items:center;justify-content:center;\n  cursor:pointer;transition:border-color .2s,background .2s;\n}\n#f-set{left:14px;font-size:17px;}\n#info-btn{right:14px;font-family:var(--font-data);font-size:15px;font-weight:700;color:rgba(212,175,55,.65);}\n#f-set:hover,#f-set:active,#info-btn:hover,#info-btn:active{border-color:rgba(212,175,55,.45);background:rgba(0,0,22,.92);color:var(--gold);}\n\n/* FILTER BAR */\n#filterbar{\n  position:absolute;left:50%;transform:translateX(-50%);z-index:108;\n  display:flex;gap:6px;\n  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;\n  padding:0 6px;max-width:calc(100vw - 28px);\n}\n#filterbar::-webkit-scrollbar{display:none;}\n.fb{\n  font-family:var(--font-data);font-size:8px;letter-spacing:.14em;\n  padding:5px 12px;border-radius:20px;\n  border:1px solid rgba(212,175,55,.16);\n  background:rgba(0,0,10,.75);color:rgba(212,175,55,.4);\n  cursor:pointer;transition:all .2s;text-transform:uppercase;\n  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);\n  white-space:nowrap;flex-shrink:0;\n}\n.fb.on,.fb:active{background:rgba(212,175,55,.11);border-color:var(--gold);color:var(--gold);}\n\n\n/* TOAST */\n#toast{position:fixed;bottom:calc(var(--sb)+88px);left:50%;transform:translateX(-50%);\n  z-index:9999;font-family:var(--font-ui);font-size:11px;letter-spacing:.07em;\n  padding:9px 20px;border-radius:20px;background:rgba(4,4,20,.95);\n  border:1px solid rgba(212,175,55,.28);color:rgba(255,255,255,.75);\n  opacity:0;pointer-events:none;transition:opacity .35s;white-space:nowrap;}\n#toast.show{opacity:1;}\n\n/* PWA INSTALL */\n#pwa-install{\n  position:fixed;bottom:calc(var(--sb)+14px);right:14px;z-index:200;\n  display:none;align-items:center;gap:8px;padding:10px 16px 10px 12px;\n  border-radius:24px;border:1px solid rgba(212,175,55,.3);\n  background:rgba(0,0,12,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);\n  cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.6),0 0 0 1px rgba(212,175,55,.06);\n  transition:box-shadow .3s,transform .15s;\n  opacity:0;transform:translateY(12px) scale(.94);\n}\n#pwa-install.visible{\n  display:flex;\n  animation:pwa-entrance .8s cubic-bezier(.22,1,.36,1) forwards,pwa-glow 1.6s ease-out .8s 1 forwards;\n}\n#pwa-install:active{transform:scale(.96)!important;}\n@keyframes pwa-entrance{\n  0%  {opacity:0;t n#intro{\n  position:fixed;inset:0;z-index:9000;background:#000004;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  overflow:hidden;\n}\n#icv{position:absolute;inset:0;width:100%;height:100%;}\n.il{opacity:0;transform:translateY(16px);\n  transition:opacity .75s cubic-bezier(.22,1,.36,1),transform .75s cubic-bezier(.22,1,.36,1);}\n.il.vis{opacity:1;transform:none;}\n#il-pre{font-family:var(--font-data);font-size:clamp(7px,1.8vw,10px);\n  letter-spacing:.46em;color:rgba(212,175,55,.35);text-transform:uppercase;\n  margin-bottom:22px;position:relative;z-index:2;}\n#il-brand{\n  font-family:var(--font-ui);font-size:clamp(42px,11vw,72px);font-weight:700;\n  letter-spacing:.14em;text-transform:uppercase;\n  background:linear-gradient(150deg,var(--gold-lt) 0%,var(--gold) 45%,var(--gold-dk) 100%);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n  position:relative;z-index:4;line-height:1;opacity:0;transform:scale(0);\n}\n#il-brand.shoot{animation:brand-shoot 1.1s cubic-bezier(.12,.8,.2,1) forwards;}\n@keyframes brand-shoot{\n  0%{opacity:0;transform:scale(0);filter:brightness(5) blur(3px);}\n  12%{opacity:1;transform:scale(1.32);filter:brightness(3.5);}\n  35%{transform:scale(0.9);filter:brightness(1.9);}\n  55%{transform:scale(1.12);filter:brightness(1.4);}\n  75%{transform:scale(0.97);filter:brightness(1.1);}\n  100%{opacity:1;transform:scale(1);filter:brightness(1);}\n}\n#intro-flash{\n  position:absolute;inset:0;z-index:3;pointer-events:none;\n  background:radial-gradient(ellipse at 50% 48%,rgba(245,224,112,.9) 0%,rgba(212,175,55,.5) 22%,transparent 60%);\n  opacity:0;}\n#intro-flash.burst{animation:flash-burst 1.5s ease-out forwards;}\n@keyframes flash-burst{0%{opacity:0;}5%{opacity:1;}25%{opacity:.3;}100%{opacity:0;}}\n#il-sub{font-family:var(--font-data);font-size:clamp(8px,2vw,11px);\n  letter-spacing:.34em;color:rgba(212,175,55,.55);text-transform:uppercase;\n  margin-top:10px;position:relative;z-index:2;}\n#il-desc{font-family:var(--font-ui);font-size:clamp(10px,2.4vw,13px);font-weight:300;\n  letter-spacing:.07em;color:rgba(255,255,255,.3);\n  margin-top:38px;position:relative;z-index:2;text-align:center;}\n\n/* VERSION BADGE im Intro */\n#il-version{\n  position:relative;z-index:2;margin-top:14px;\n  font-family:var(--font-data);font-size:8px;letter-spacing:.3em;\n  color:rgba(212,175,55,.28);text-transform:uppercase;\n}\n#intro-bar-wrap{\n  position:absolute;bottom:66px;left:50%;transform:translateX(-50%);\n  width:min(280px,62vw);height:2px;background:rgba(212,175,55,.08);\n  border-radius:1px;z-index:2;opacity:0;transition:opacity .6s;\n}\n#intro-bar{height:100%;width:0%;\n  background:linear-gradient(90deg,transparent,var(--gold),var(--gold-lt));\n  border-radius:1px;transition:width .05s linear;}\n#intro-pct{\n  position:absolute;bottom:54px;left:50%;transform:translateX(-50%);\n  font-family:var(--font-data);font-size:9px;letter-spacing:.24em;\n  color:rgba(212,175,55,.3);text-transform:uppercase;z-index:2;\n  opacity:0;transition:opacity .6s;\n}\n#intro-foot{\n  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);\n  font-family:var(--font-data);font-size:7px;letter-spacing:.2em;\n  color:rgba(212,175,55,.2);text-transform:uppercase;z-index:2;\n  opacity:0;transition:opacity 1.2s;white-space:nowrap;\n}\n\n/* ── CONSENT ────────────────────────────────────── */\n#consent{\n  position:fixed;inset:0;z-index:8000;\n  background:rgba(0,0,10,.98);\n  display:none;align-items:center;justify-content:center;padding:20px;\n  overflow-y:auto;\n}\n.cc{\n  background:linear-gradient(160deg,rgba(10,10,32,.99),rgba(2,2,18,.99));\n  border:1px solid rgba(212,175,55,.22);border-radius:20px;\n  padding:clamp(20px,5vw,36px);max-width:460px;width:100%;\n  box-shadow:0 0 100px rgba(0,0,0,.98),0 0 200px rgba(212,175,55,.04);\n}\n.cc-logo{font-family:var(--font-ui);font-size:22px;font-weight:700;letter-spacing:.16em;\n  background:linear-gradient(135deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n  text-align:center;margin-bottom:4px;}\n.cc-by{font-family:var(--font-data);font-size:8px;letter-spacing:.3em;\n  color:rgba(212,175,55,.35);text-align:center;margin-bottom:22px;text-transform:uppercase;}\n.cc-h{font-size:16px;font-weight:600;color:#fff;text-align:center;margin-bottom:10px;}\n.cc-p{font-size:11.5px;color:rgba(255,255,255,.45);line-height:1.65;text-align:center;margin-bottom:20px;}\n.lang-row{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}\n.lb{font-family:var(--font-data);font-size:9px;letter-spacing:.18em;\n  padding:5px 14px;border-radius:20px;border:1px solid rgba(212,175,55,.22);\n  background:transparent;color:rgba(212,175,55,.5);cursor:pointer;transition:all .2s;text-transform:uppercase;}\n.lb.on,.lb:hover{background:rgba(212,175,55,.1);border-color:var(--gold);color:var(--gold);}\n.legal{max-height:130px;overflow-y:auto;background:rgba(0,0,0,.35);\n  border:1px solid rgba(212,175,55,.08);border-radius:12px;\n  padding:12px 14px;margin-bottom:18px;font-size:9.5px;\n  color:rgba(255,255,255,.32);line-height:1.8;white-space:pre-wrap;\n  scrollbar-width:thin;scrollbar-color:rgba(212,175,55,.25) transparent;}\n.chk-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px;}\n.chk-row input{width:18px;height:18px;flex-shrink:0;accent-color:var(--gold);margin-top:2px;cursor:pointer;}\n.chk-row label{font-size:11px;color:rgba(255,255,255,.55);line-height:1.55;cursor:pointer;}\n.cta{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;\n  font-family:var(--font-ui);font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;\n  background:linear-gradient(135deg,var(--gold-dk),var(--gold) 50%,var(--gold-lt));\n  color:var(--ink);box-shadow:0 4px 32px rgba(212,175,55,.28);transition:opacity .2s,transform .15s;}\n.cta:disabled{opacity:.3;cursor:not-allowed;}\n.cta:not(:disabled):active{transform:scale(.97);}\n\n/* ── APP ─────────────────────────────────────────── */\n#app{position:fixed;inset:0;display:none;flex-direction:column;background:var(--deep);}\n#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair;}\n\n/* TOPBAR */\n#topbar{\n  position:absolute;top:0;left:0;right:0;z-index:100;\n  padding:calc(var(--st) + 12px) 18px 12px;\n  display:flex;align-items:center;justify-content:space-between;\n  background:linear-gradient(180deg,rgba(0,0,12,.97) 0%,transparent 100%);\n  pointer-events:none;\n}\n#tb-logo{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.18em;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#tb-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}\n#tb-conn{font-family:var(--font-data);font-size:8px;letter-spacing:.18em;color:rgba(212,175,55,.4);text-transform:uppercase;}\n#tb-time{font-family:var(--font-data);font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.22);text-transform:uppercase;}\n\n/* BADGE (Network Name) */\n#badge{position:absolute;top:0;left:50%;transform:translateX(-50%);padding:calc(var(--st)+12px) 0 0;z-index:101;}\n#badge-inner{\n  font-family:var(--font-data);font-size:8px;letter-spacing:.26em;color:rgba(212,175,55,.45);\n  text-transform:uppercase;padding:5px 16px;border-radius:20px;\n  border:1px solid rgba(212,175,55,.12);background:rgba(0,0,12,.65);\n  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:all .4s;\n  max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\n}\n#badge-inner.on{color:var(--gold);border-color:rgba(212,175,55,.35);}\n#badge-inner.off{color:var(--amber);}\n\n/* ── SCAN BUTTON ──────────────────────────────────── */\n#scan-btn{\n  position:absolute;left:50%;transform:translateX(-50%);\n  bottom:calc(var(--sb) + 136px);\n  width:clamp(140px,40vw,176px);height:clamp(140px,40vw,176px);\n  border-radius:50%;border:none;cursor:pointer;z-index:110;\n  background:radial-gradient(ellipse at 36% 30%,rgba(245,224,112,.14) 0%,#000 65%);\n  box-shadow:\n    0 0 0 1px rgba(212,175,55,.22),\n    0 0 0 8px rgba(212,175,55,.04),\n    0 0 0 16px rgba(212,175,55,.02),\n    0 10px 50px rgba(0,0,0,.9),\n    inset 0 1px 0 rgba(212,175,55,.14);\n  transition:box-shadow .4s,transform .18s;\n}\n#scan-btn:active{transform:translateX(-50%) scale(.94);}\n@keyframes pulse-ring{\n  0%  {box-shadow:0 0 0 1px rgba(212,175,55,.55),0 0 0 8px rgba(212,175,55,.09),0 0 40px rgba(212,175,55,.18),0 10px 50px rgba(0,0,0,.8),inset 0 1px 0 rgba(212,175,55,.2);}\n  60% {box-shadow:0 0 0 1px rgba(212,175,55,.4),0 0 0 22px rgba(212,175,55,.0),0 0 60px rgba(212,175,55,.13),0 10px 50px rgba(0,0,0,.8),inset 0 1px 0 rgba(212,175,55,.2);}\n  100%{box-shadow:0 0 0 1px rgba(212,175,55,.55),0 0 0 8px rgba(212,175,55,.09),0 0 40px rgba(212,175,55,.18),0 10px 50px rgba(0,0,0,.8),inset 0 1px 0 rgba(212,175,55,.2);}\n}\n#scan-btn.on{animation:pulse-ring 2.4s ease-in-out infinite;}\n#orb{position:absolute;inset:15px;border-radius:50%;overflow:hidden;\n  background:radial-gradient(ellipse at 38% 30%,rgba(245,224,112,.07) 0%,rgba(0,0,10,.97) 70%);\n  border:1px solid rgba(212,175,55,.12);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}\n#orb-quality{\n  width:48px;height:4px;border-radius:2px;background:rgba(255,255,255,.06);\n  overflow:hidden;margin-bottom:3px;\n}\n#orb-quality-bar{height:100%;width:0%;border-radius:2px;transition:width .6s,background .6s;}\n#orb-val{font-family:var(--font-data);font-size:clamp(26px,8vw,34px);font-weight:700;color:var(--gold);line-height:1;}\n#orb-unit{font-family:var(--font-data);font-size:8px;color:rgba(212,175,55,.4);letter-spacing:.2em;margin-top:1px;}\n#orb-dbm{font-family:var(--font-data);font-size:9px;color:rgba(255,255,255,.28);margin-top:4px;}\n#orb-trend{font-family:var(--font-data);font-size:10px;margin-top:2px;transition:color .4s;}\n#btn-icon{font-size:clamp(22px,6.5vw,30px);display:block;line-height:1;margin-bottom:2px;}\n#btn-lbl{font-family:var(--font-ui);font-size:clamp(9px,2.2vw,11px);font-weight:700;\n  letter-spacing:.16em;color:var(--gold);text-transform:uppercase;display:block;margin-top:4px;}\n\n/* ── METRICS GRID ────────────────────────────────── */\n#metrics{\n  position:absolute;bottom:0;left:0;right:0;z-index:100;\n  padding:14px 10px calc(var(--sb)+10px);\n  background:linear-gradient(0deg,rgba(0,0,12,.98) 0%,rgba(0,0,12,.75) 65%,transparent 100%);\n}\n.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap);}\n.mc{\n  background:rgba(255,255,255,.024);border:1px solid rgba(212,175,55,.08);\n  border-radius:var(--radius);padding:10px 8px 8px;text-align:center;\n  position:relative;overflow:hidden;transition:border-color .35s,box-shadow .35s,transform .2s;\n  cursor:pointer;\n}\n.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;\n  background:linear-gradient(90deg,transparent,rgba(212,175,55,.24),transparent);}\n.mc:active{transform:scale(.96);}\n.mc.live{border-color:rgba(212,175,55,.25);box-shadow:0 0 16px rgba(212,175,55,.05);}\n.mc.highlight{border-color:rgba(0,200,255,.3);box-shadow:0 0 16px rgba(0,200,255,.06);}\n.ml{font-family:var(--font-data);font-size:7px;letter-spacing:.24em;\n  color:rgba(212,175,55,.4);text-transform:uppercase;margin-bottom:4px;}\n.mv{font-family:var(--font-data);font-size:clamp(16px,4.8vw,22px);font-weight:700;color:var(--gold);line-height:1;}\n.mv.g{color:var(--green);}.mv.o{color:var(--gold);}.mv.a{color:var(--amber);}.mv.r{color:var(--red);}\n.mv.p{color:var(--purple);}\n.mu{font-size:7.5px;color:rgba(255,255,255,.28);margin-top:3px;}\n\n/* ── MINI SPARKLINE in Metric Cards ────────────── */\n.mc-spark{width:100%;height:20px;display:block;margin-top:6px;opacity:.6;}\n\n/* ── LEGEND ─────────────────────────────────────── */\n#legend{position:absolute;right:12px;z-index:100;}\n.li{display:flex;align-items:center;gap:5px;margin-bottom:6px;}\n.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}\n.ll{font-family:var(--font-data);font-size:7.5px;letter-spacing:.1em;color:rgba(255,255,255,.38);}\n\n/* ── STATUS MSG ──────────────────────────────────── */\n#smsg{position:absolute;left:50%;transform:translateX(-50%);z-index:105;\n  font-family:var(--font-ui);font-size:clamp(10px,2.5vw,12px);\n  color:rgba(255,255,255,.4);letter-spacing:.06em;text-align:center;\n  width:min(300px,80vw);pointer-events:none;transition:opacity .5s;}\n\n/* ── ACTION BUTTONS (Gear, Info, Radar, Export) ── */\n.action-btn{\n  position:absolute;z-index:120;\n  width:44px;height:44px;border-radius:50%;\n  border:1px solid rgba(212,175,55,.18);background:rgba(0,0,12,.75);\n  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);\n  display:flex;align-items:center;justify-content:center;\n  cursor:pointer;transition:border-color .2s,background .2s,transform .15s;\n  font-size:18px;color:rgba(212,175,55,.65);\n}\n.action-btn:hover,.action-btn:active{\n  border-color:rgba(212,175,55,.45);background:rgba(0,0,24,.92);color:var(--gold);\n  transform:scale(1.08);}\n#f-set{left:14px;}\n#info-btn{right:14px;font-family:var(--font-data);font-size:15px;font-weight:700;}\n#radar-btn{left:14px;}\n#export-btn{right:14px;}\n\n/* ── FILTER BAR ──────────────────────────────────── */\n#filterbar{\n  position:absolute;left:50%;transform:translateX(-50%);z-index:108;\n  display:flex;gap:7px;\n  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;\n  padding:0 8px;max-width:calc(100vw - 28px);\n}\n#filterbar::-webkit-scrollbar{display:none;}\n.fb{\n  font-family:var(--font-data);font-size:8px;letter-spacing:.14em;\n  padding:6px 13px;border-radius:20px;\n  border:1px solid rgba(212,175,55,.16);\n  background:rgba(0,0,12,.78);color:rgba(212,175,55,.4);\n  cursor:pointer;transition:all .22s;text-transform:uppercase;\n  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);\n  white-space:nowrap;flex-shrink:0;\n}\n.fb.on,.fb:active{background:rgba(212,175,55,.12);border-color:var(--gold);color:var(--gold);}\n\n/* ── TOAST ───────────────────────────────────────── */\n#toast{position:fixed;bottom:calc(var(--sb)+92px);left:50%;transform:translateX(-50%);\n  z-index:9999;font-family:var(--font-ui);font-size:11.5px;letter-spacing:.07em;\n  padding:10px 22px;border-radius:22px;background:rgba(4,4,22,.97);\n  border:1px solid rgba(212,175,55,.3);color:rgba(255,255,255,.78);\n  opacity:0;pointer-events:none;transition:opacity .35s;white-space:nowrap;\n  box-shadow:0 4px 20px rgba(0,0,0,.7);}\n#toast.show{opacity:1;}\n\n/* ── RADAR OVERLAY ───────────────────────────────── */\n#radar-overlay{\n  position:fixed;inset:0;z-index:4000;\n  background:rgba(0,0,10,.95);backdrop-filter:blur(10px);\n  display:none;flex-direction:column;align-items:center;justify-content:flex-start;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+20px);overflow-y:auto;\n}\n#radar-overlay.open{display:flex;}\n.ro-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:14px;}\n.ro-title{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#radar-canvas{\n  width:min(320px,88vw);height:min(320px,88vw);border-radius:50%;\n  border:1px solid rgba(212,175,55,.15);\n  background:radial-gradient(circle,rgba(0,20,0,.6) 0%,rgba(0,8,0,.95) 100%);\n  display:block;margin:0 auto 20px;\n}\n#radar-list{width:100%;max-width:500px;}\n.rl-item{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:10px 14px;border-radius:12px;margin-bottom:7px;\n  background:rgba(255,255,255,.024);border:1px solid rgba(212,175,55,.07);\n  cursor:pointer;transition:all .2s;\n}\n.rl-item:hover{border-color:rgba(212,175,55,.25);background:rgba(212,175,55,.04);}\n.rl-ssid{font-family:var(--font-ui);font-size:13px;font-weight:600;color:rgba(255,255,255,.82);}\n.rl-meta{font-family:var(--font-data);font-size:9px;color:rgba(255,255,255,.32);margin-top:2px;}\n.rl-bar-wrap{width:80px;height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:3px;}\n.rl-bar{height:100%;border-radius:3px;transition:width .5s;}\n.rl-dbm{font-family:var(--font-data);font-size:11px;font-weight:700;min-width:52px;text-align:right;}\n\n/* ── HISTORY CHART OVERLAY ───────────────────────── */\n#history-overlay{\n  position:fixed;inset:0;z-index:4000;\n  background:rgba(0,0,10,.97);\n  display:none;flex-direction:column;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+20px);overflow-y:auto;\n}\n#history-overlay.open{display:flex;}\n.ho-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:14px;}\n.ho-title{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#history-canvas{width:100%;height:220px;display:block;border-radius:12px;\n  border:1px solid rgba(212,175,55,.08);background:rgba(4,4,16,.8);}\n#history-stats{\n  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;\n}\n.hs-card{background:rgba(255,255,255,.024);border:1px solid rgba(212,175,55,.08);\n  border-radius:12px;padding:12px 10px;text-align:center;}\n.hs-lbl{font-family:var(--font-data);font-size:7px;letter-spacing:.22em;\n  color:rgba(212,175,55,.38);text-transform:uppercase;margin-bottom:5px;}\n.hs-val{font-family:var(--font-data);font-size:18px;font-weight:700;color:var(--gold);}\n.hs-unit{font-size:8px;color:rgba(255,255,255,.28);margin-top:2px;}\n\n/* ── BUBBLE DETAIL ───────────────────────────────── */\n#bdetail{\n  position:fixed;bottom:0;left:0;right:0;z-index:3000;\n  pointer-events:none;\n  transform:translateY(100%);transition:transform .44s cubic-bezier(.22,1,.36,1);\n}\n#bdetail.open{transform:translateY(0);pointer-events:all;}\n#bdetail-sheet{\n  background:linear-gradient(170deg,rgba(8,8,26,.99),rgba(0,0,12,.99));\n  border:1px solid rgba(212,175,55,.18);border-bottom:none;\n  border-radius:22px 22px 0 0;\n  padding:10px 20px calc(var(--sb) + 24px);\n  box-shadow:0 -8px 60px rgba(0,0,0,.9),0 0 0 1px rgba(212,175,55,.06);\n}\n#bdetail-drag{width:40px;height:4px;border-radius:2px;\n  background:rgba(212,175,55,.2);margin:0 auto 16px;cursor:grab;}\n#bdetail-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}\n#bdetail-name{font-family:var(--font-ui);font-size:16px;font-weight:700;letter-spacing:.1em;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#bdetail-dbm{font-family:var(--font-data);font-size:9px;color:rgba(255,255,255,.32);margin-top:4px;}\n.bd-close{width:32px;height:32px;border-radius:50%;border:1px solid rgba(212,175,55,.2);\n  background:transparent;color:var(--gold);font-size:14px;cursor:pointer;\n  display:flex;align-items:center;justify-content:center;transition:background .2s;}\n.bd-close:hover{background:rgba(212,175,55,.1);}\n#bdetail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}\n.bd-cell{background:rgba(255,255,255,.028);border:1px solid rgba(212,175,55,.08);\n  border-radius:12px;padding:10px 12px;}\n.bd-lbl{font-family:var(--font-data);font-size:7px;letter-spacing:.22em;\n  color:rgba(212,175,55,.38);text-transform:uppercase;margin-bottom:5px;}\n.bd-val{font-family:var(--font-data);font-size:15px;font-weight:700;color:var(--gold);}\n.bd-note{font-size:8px;color:rgba(255,255,255,.26);margin-top:3px;}\n#bdetail-spark-lbl{font-family:var(--font-data);font-size:7px;letter-spacing:.22em;\n  color:rgba(212,175,55,.32);text-transform:uppercase;margin-bottom:8px;}\n#bdetail-spark{width:100%;height:50px;display:block;border-radius:8px;}\n\n/* ── COMPASS OVERLAY ─────────────────────────────── */\n#compass-overlay{\n  position:fixed;inset:0;z-index:4500;\n  background:rgba(0,0,10,.97);backdrop-filter:blur(8px);\n  display:none;flex-direction:column;align-items:center;justify-content:center;\n}\n#compass-overlay.open{display:flex;}\n#compass-canvas{\n  width:min(300px,80vw);height:min(300px,80vw);border-radius:50%;\n  display:block;\n}\n.comp-info{margin-top:16px;text-align:center;}\n.comp-label{font-family:var(--font-data);font-size:9px;letter-spacing:.28em;\n  color:rgba(212,175,55,.4);text-transform:uppercase;margin-bottom:4px;}\n.comp-val{font-family:var(--font-ui);font-size:22px;font-weight:700;color:var(--gold);}\n.comp-close-btn{\n  position:absolute;top:calc(var(--st)+20px);right:18px;\n  width:42px;height:42px;border-radius:50%;\n  border:1px solid rgba(212,175,55,.22);background:rgba(0,0,12,.7);\n  color:var(--gold);font-size:16px;cursor:pointer;\n  display:flex;align-items:center;justify-content:center;\n}\n\n/* ── SETTINGS ────────────────────────────────────── */\n#settings{\n  position:fixed;inset:0;z-index:5000;background:rgba(0,0,10,.99);\n  display:none;flex-direction:column;overflow-y:auto;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+24px);\n}\n#settings.open{display:flex;}\n.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-top:16px;}\n.st{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n.sx{width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,175,55,.22);\n  background:transparent;color:var(--gold);font-size:16px;cursor:pointer;\n  display:flex;align-items:center;justify-content:center;transition:all .2s;}\n.sx:hover{background:rgba(212,175,55,.1);}\n.ss{margin-bottom:22px;}\n.sst{font-family:var(--font-data);font-size:8px;letter-spacing:.3em;color:rgba(212,175,55,.38);\n  text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid rgba(212,175,55,.07);margin-bottom:12px;}\n.sr{display:flex;align-items:center;justify-content:space-between;\n  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);}\n.srl{font-size:13px;color:rgba(255,255,255,.68);}\n.srs{font-size:9.5px;color:rgba(255,255,255,.28);margin-top:2px;}\n.tog{position:relative;width:44px;height:24px;flex-shrink:0;}\n.tog input{opacity:0;width:0;height:0;}\n.tog-t{position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,.08);\n  border:1px solid rgba(212,175,55,.18);cursor:pointer;transition:background .25s;}\n.tog input:checked+.tog-t{background:rgba(212,175,55,.32);border-color:var(--gold);}\n.tog-k{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;\n  background:rgba(255,255,255,.45);transition:transform .25s,background .25s;pointer-events:none;}\n.tog input:checked~.tog-k{transform:translateX(20px);background:var(--gold);}\n/* Range Slider */\n.srange{-webkit-appearance:none;appearance:none;width:100%;height:3px;\n  border-radius:2px;background:rgba(212,175,55,.18);outline:none;margin:8px 0;}\n.srange::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;\n  background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(212,175,55,.5);}\n\n/* ── INFO OVERLAY ────────────────────────────────── */\n#info-overlay{\n  position:fixed;inset:0;z-index:6000;background:rgba(0,0,10,.99);\n  display:none;flex-direction:column;overflow-y:auto;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+24px);\n}\n#info-overlay.open{display:flex;}\n.io-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-top:16px;}\n.io-title{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n.io-sec{margin-bottom:24px;}\n.io-sec-title{font-family:var(--font-data);font-size:8px;letter-spacing:.28em;color:rgba(212,175,55,.38);\n  text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid rgba(212,175,55,.07);margin-bottom:14px;}\n.io-item{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.03);}\n.io-icon{font-size:20px;width:30px;flex-shrink:0;text-align:center;line-height:1.4;}\n.io-item-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.84);margin-bottom:4px;}\n.io-item-desc{font-size:11px;color:rgba(255,255,255,.38);line-height:1.7;}\n\n/* ── GPS DIALOG ──────────────────────────────────── */\n#gps-permit{position:fixed;inset:0;z-index:4500;background:rgba(0,0,10,.92);\n  backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;}\n#gps-permit.open{display:flex;}\n#gps-card{background:linear-gradient(160deg,#000a18 0%,#000512 100%);\n  border:1px solid rgba(0,180,255,.2);border-radius:22px;\n  padding:30px 26px 22px;max-width:320px;width:90%;text-align:center;\n  box-shadow:0 0 50px rgba(0,180,255,.09),0 24px 70px rgba(0,0,0,.75);}\n#gps-card-icon{font-size:40px;margin-bottom:16px;display:block;\n  filter:drop-shadow(0 0 16px rgba(0,180,255,.55));}\n#gps-card-title{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.3em;\n  color:rgba(0,210,255,.92);margin-bottom:12px;}\n#gps-card-desc{font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,.38);\n  line-height:1.75;margin-bottom:24px;}\n#gps-card-desc b{color:rgba(0,210,255,.65);}\n#gps-grant{width:100%;padding:14px;margin-bottom:12px;\n  background:rgba(0,180,255,.09);border:1px solid rgba(0,180,255,.38);border-radius:26px;\n  color:rgba(0,210,255,.92);font-family:var(--font-ui);font-size:9px;font-weight:700;\n  letter-spacing:.24em;cursor:pointer;transition:background .2s;}\n#gps-grant:active{background:rgba(0,180,255,.2);}\n#gps-skip{background:none;border:none;color:rgba(255,255,255,.22);\n  font-family:var(--font-data);font-size:8px;letter-spacing:.12em;cursor:pointer;padding:7px;}\n\n/* ── PWA INSTALL ──────────────────────────────────── */\n#pwa-install{\n  position:fixed;bottom:calc(var(--sb)+16px);right:16px;z-index:200;\n  display:none;align-items:center;gap:9px;padding:11px 18px 11px 13px;\n  border-radius:26px;border:1px solid rgba(212,175,55,.32);\n  background:rgba(0,0,14,.94);backdrop-filter:blur(14px);\n  cursor:pointer;box-shadow:0 4px 28px rgba(0,0,0,.65);\n  opacity:0;transform:translateY(14px) scale(.93);\n}\n#pwa-install.visible{\n  display:flex;\n  animation:pwa-entrance .85s cubic-bezier(.22,1,.36,1) forwards,pwa-glow 1.8s ease-out .85s 1 forwards;\n}\n#pwa-install:active{transform:scale(.95)!important;}\n@keyframes pwa-entrance{\n  0%{opacity:0;transform:translateY(14px) scale(.93);}\n  60%{opacity:1;transform:translateY(-4px) scale(1.05);}\n  80%{transform:translateY(1px) scale(.99);}\n  100%{opacity:1;transform:translateY(0) scale(1);}\n}\n@keyframes pwa-glow{\n  0%{box-shadow:0 4px 28px rgba(0,0,0,.65);}\n  30%{box-shadow:0 4px 36px rgba(0,0,0,.45),0 0 30px rgba(212,175,55,.32),0 0 0 5px rgba(212,175,55,.13);}\n  100%{box-shadow:0 4px 28px rgba(0,0,0,.65);}\n}\n.pwa-icon{font-size:20px;line-height:1;}\n.pwa-lbl{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}\n.pwa-sub{font-family:var(--font-data);font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,.35);margin-top:2px;}\n\n/* ── TAP TO START ────────────────────────────────── */\n#tap-start{\n  position:fixed;inset:0;z-index:9500;background:#000006;\n  display:none;align-items:center;justify-content:center;flex-direction:column;\n  cursor:pointer;\n}\n#tap-start-logo{font-family:var(--font-ui);font-size:clamp(34px,10vw,60px);font-weight:700;\n  letter-spacing:.16em;text-transform:uppercase;\n  background:linear-gradient(150deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;\n  margin-bottom:14px;}\n#tap-start-hint{font-family:var(--font-data);font-size:clamp(9px,2.2vw,12px);letter-spacing:.4em;\n  color:rgba(212,175,55,.45);text-transform:uppercase;margin-bottom:56px;}\n#tap-start-orb{\n  width:clamp(74px,19vw,96px);height:clamp(74px,19vw,96px);border-radius:50%;\n  background:radial-gradient(ellipse at 38% 32%,rgba(245,224,112,.1) 0%,rgba(0,0,10,.98) 70%);\n  border:1px solid rgba(212,175,55,.24);\n  display:flex;align-items:center;justify-content:center;\n  font-size:clamp(28px,7.5vw,40px);\n  animation:tap-pulse 2.2s ease-in-out infinite;\n}\n@keyframes tap-pulse{\n  0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.3),0 0 26px rgba(212,175,55,.08);}\n  50%{box-shadow:0 0 0 22px rgba(212,175,55,0),0 0 44px rgba(212,175,55,.2);}\n}\n#tap-start-label{font-family:var(--font-data);font-size:clamp(8px,2vw,10px);letter-spacing:.34em;\n  color:rgba(212,175,55,.3);text-transform:uppercase;margin-top:24px;}\n\n::-webkit-scrollbar{width:3px;}\n::-webkit-scrollbar-track{background:transparent;}\n::-webkit-scrollbar-thumb{background:rgba(212,175,55,.22);border-radius:3px;}\n\n/* ── SIGNAL QUALITY RING on main canvas ─────────── */\n/* (rendered via JS) */\n\u003C/style>\n\u003C/head>\n\u003Cbody>\n\n\u003C!-- ════ INTRO ════════════════════════════════════ -->\n\u003Cdiv id=\"intro\">\n  \u003Ccanvas id=\"icv\">\u003C/canvas>\n  \u003Cdiv id=\"intro-flash\">\u003C/div>\n  \u003Cdiv id=\"il-pre\"  class=\"il\">COBRA DYNAMICS PRESENTS\u003C/div>\n  \u003Cdiv id=\"il-brand\">WIPULSCAN\u003C/div>\n  \u003Cdiv id=\"il-sub\"  class=\"il\">PRO EDITION · v6.0\u003C/div>\n  \u003Cdiv id=\"il-desc\" class=\"il\">Spatial WiFi Signal Scanner &amp; AR Visualizer\u003C/div>\n  \u003Cdiv id=\"il-version\" class=\"il\">SIGNAL HEATMAP · RADAR VIEW · HISTORY CHART\u003C/div>\n  \u003Cdiv id=\"intro-bar-wrap\">\u003Cdiv id=\"intro-bar\">\u003C/div>\u003C/div>\n  \u003Cdiv id=\"intro-pct\">0%\u003C/div>\n  \u003Cdiv id=\"intro-foot\">© Cobra Dynamics 2026 · Dennis Stein &amp; Christoph Frick · Langen, Germany\u003C/div>\n\u003C/div>\n\n\u003C!-- ════ CONSENT ══════════════════════════════════ -->\n\u003Cdiv id=\"consent\">\n  \u003Cdiv class=\"cc\">\n    \u003Cdiv class=\"cc-logo\">WIPULSCAN PRO\u003C/div>\n    \u003Cdiv class=\"cc-by\">Cobra Dynamics · v6.0 · 2026\u003C/div>\n    \u003Cdiv class=\"lang-row\">\n      \u003Cbutton class=\"lb on\" data-lang=\"de\" onclick=\"setLang('de')\">DE\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"en\" onclick=\"setLang('en')\">EN\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"zh\" onclick=\"setLang('zh')\">中文\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"es\" onclick=\"setLang('es')\">ES\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"fr\" onclick=\"setLang('fr')\">FR\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"ru\" onclick=\"setLang('ru')\">РУ\u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"cc-h\"  id=\"c-eye\">\u003C/div>\n    \u003Cdiv class=\"cc-p\"  id=\"c-sub\">\u003C/div>\n    \u003Cdiv class=\"legal\" id=\"c-leg\">\u003C/div>\n    \u003Cdiv class=\"chk-row\">\n      \u003Cinput type=\"checkbox\" id=\"chk\"\n        onchange=\"document.getElementById('cta').disabled=!this.checked\"/>\n      \u003Clabel for=\"chk\" id=\"c-chk\">\u003C/label>\n    \u003C/div>\n    \u003Cbutton class=\"cta\" id=\"cta\" disabled onclick=\"acceptConsent()\">\u003C/button>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ GPS DIALOG ═══════════════════════════════ -->\n\u003Cdiv id=\"gps-permit\">\n  \u003Cdiv id=\"gps-card\">\n    \u003Cspan id=\"gps-card-icon\">📍\u003C/span>\n    \u003Cdiv id=\"gps-card-title\">STANDORT · GPS\u003C/div>\n    \u003Cdiv id=\"gps-card-desc\">\n      WIPULSCAN benötigt deinen Standort um den \u003Cb>Signalpfad\u003C/b> aufzuzeichnen\n      und dir zu zeigen, \u003Cb>in welche Richtung\u003C/b> du für besseren Empfang gehen solltest.\n    \u003C/div>\n    \u003Cbutton id=\"gps-grant\" onclick=\"requestGPS()\">📍 STANDORT FREIGEBEN\u003C/button>\n    \u003Cbutton id=\"gps-skip\" onclick=\"skipGPS()\">Überspringen\u003C/button>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ TAP TO START ═════════════════════════════ -->\n\u003Cdiv id=\"tap-start\" onclick=\"tapToStart()\">\n  \u003Cdiv id=\"tap-start-logo\">WIPULSCAN\u003C/div>\n  \u003Cdiv id=\"tap-start-hint\">PRO EDITION · v6.0\u003C/div>\n  \u003Cdiv id=\"tap-start-orb\">📡\u003C/div>\n  \u003Cdiv id=\"tap-start-label\">TIPPEN ZUM STARTEN\u003C/div>\n\u003C/div>\n\n\u003C!-- ════ MAIN APP ═════════════════════════════════ -->\n\u003Cdiv id=\"app\">\n  \u003Ccanvas id=\"cv\">\u003C/canvas>\n\n  \u003C!-- TOPBAR -->\n  \u003Cdiv id=\"topbar\">\n    \u003Cdiv id=\"tb-logo\">WIPULSCAN\u003C/div>\n    \u003Cdiv id=\"tb-status\">\n      \u003Cdiv id=\"tb-conn\">—\u003C/div>\n      \u003Cdiv id=\"tb-time\">--:--:--\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- BADGE -->\n  \u003Cdiv id=\"badge\">\u003Cdiv id=\"badge-inner\">—\u003C/div>\u003C/div>\n\n  \u003C!-- GEAR + INFO -->\n  \u003Cdiv class=\"action-btn\" id=\"f-set\" onclick=\"openSettings()\">⚙\u003C/div>\n  \u003Cdiv class=\"action-btn\" id=\"info-btn\" onclick=\"openInfo()\">?\u003C/div>\n\n  \u003C!-- STATUS -->\n  \u003Cdiv id=\"smsg\">\u003C/div>\n\n  \u003C!-- FILTER BAR (positioned by JS) -->\n  \u003Cdiv id=\"filterbar\">\u003C/div>\n\n  \u003C!-- SCAN BUTTON -->\n  \u003Cbutton id=\"scan-btn\" onclick=\"toggleScan()\">\n    \u003Cdiv id=\"orb\">\n      \u003Cdiv id=\"orb-quality\">\u003Cdiv id=\"orb-quality-bar\">\u003C/div>\u003C/div>\n      \u003Cdiv id=\"orb-val\">—\u003C/div>\n      \u003Cdiv id=\"orb-unit\">MBPS\u003C/div>\n      \u003Cdiv id=\"orb-dbm\">— dBm\u003C/div>\n      \u003Cdiv id=\"orb-trend\">—\u003C/div>\n    \u003C/div>\n    \u003Cspan id=\"btn-icon\">📡\u003C/span>\n    \u003Cspan id=\"btn-lbl\">SCAN\u003C/span>\n  \u003C/button>\n\n  \u003C!-- LEGEND (positioned by JS) -->\n  \u003Cdiv id=\"legend\">\u003C/div>\n\n  \u003C!-- METRICS -->\n  \u003Cdiv id=\"metrics\">\n    \u003Cdiv class=\"mgrid\">\n      \u003Cdiv class=\"mc\" id=\"mc-sig\" onclick=\"openHistory()\">\n        \u003Cdiv class=\"ml\" data-i18n=\"signal\">SIGNAL\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-sig\">—\u003C/div>\n        \u003Cdiv class=\"mu\">dBm\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"spark-sig\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-dl\" onclick=\"openHistory()\">\n        \u003Cdiv class=\"ml\" data-i18n=\"download\">DOWN\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-dl\">—\u003C/div>\n        \u003Cdiv class=\"mu\">Mbps\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"spark-dl\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-ul\">\n        \u003Cdiv class=\"ml\" data-i18n=\"upload\">UP\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-ul\">—\u003C/div>\n        \u003Cdiv class=\"mu\">Mbps\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"spark-ul\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-lat\">\n        \u003Cdiv class=\"ml\" data-i18n=\"latency\">LATENZ\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-lat\">—\u003C/div>\n        \u003Cdiv class=\"mu\">ms\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"spark-lat\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-net\" onclick=\"openRadar()\">\n        \u003Cdiv class=\"ml\" data-i18n=\"networks\">NETZE\u003C/div>\n        \u003Cdiv class=\"mv p\" id=\"mv-net\">—\u003C/div>\n        \u003Cdiv class=\"mu\">gefunden\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"spark-net\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-freq\">\n        \u003Cdiv class=\"ml\" data-i18n=\"freq\">BAND\u003C/div>\n        \u003Cdiv class=\"mv cyan\" id=\"mv-freq\" style=\"font-size:14px;\">—\u003C/div>\n        \u003Cdiv class=\"mu\" id=\"mu-freq\">GHz\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"spark-freq\">\u003C/canvas>\n      \u003C/div>\n    \u003C/div>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ BUBBLE DETAIL ════════════════════════════ -->\n\u003Cdiv id=\"bdetail\">\n  \u003Cdiv id=\"bdetail-sheet\">\n    \u003Cdiv id=\"bdetail-drag\">\u003C/div>\n    \u003Cdiv id=\"bdetail-hdr\">\n      \u003Cdiv>\n        \u003Cdiv id=\"bdetail-name\">—\u003C/div>\n        \u003Cdiv id=\"bdetail-dbm\">—\u003C/div>\n      \u003C/div>\n      \u003Cbutton class=\"bd-close\" onclick=\"closeBDetail()\">✕\u003C/button>\n    \u003C/div>\n    \u003Cdiv id=\"bdetail-grid\">\n      \u003Cdiv class=\"bd-cell\">\u003Cdiv class=\"bd-lbl\">SIGNAL\u003C/div>\u003Cdiv class=\"bd-val\" id=\"bd-sig\">—\u003C/div>\u003Cdiv class=\"bd-note\">dBm\u003C/div>\u003C/div>\n      \u003Cdiv class=\"bd-cell\">\u003Cdiv class=\"bd-lbl\">QUALITÄT\u003C/div>\u003Cdiv class=\"bd-val\" id=\"bd-qual\">—\u003C/div>\u003Cdiv class=\"bd-note\">%\u003C/div>\u003C/div>\n      \u003Cdiv class=\"bd-cell\">\u003Cdiv class=\"bd-lbl\">KANAL\u003C/div>\u003Cdiv class=\"bd-val\" id=\"bd-ch\">—\u003C/div>\u003Cdiv class=\"bd-note\">802.11\u003C/div>\u003C/div>\n      \u003Cdiv class=\"bd-cell\">\u003Cdiv class=\"bd-lbl\">FREQUENZ\u003C/div>\u003Cdiv class=\"bd-val\" id=\"bd-freq\">—\u003C/div>\u003Cdiv class=\"bd-note\">GHz\u003C/div>\u003C/div>\n      \u003Cdiv class=\"bd-cell\">\u003Cdiv class=\"bd-lbl\">DOWNLOAD\u003C/div>\u003Cdiv class=\"bd-val\" id=\"bd-dl\">—\u003C/div>\u003Cdiv class=\"bd-note\">Mbps\u003C/div>\u003C/div>\n      \u003Cdiv class=\"bd-cell\">\u003Cdiv class=\"bd-lbl\">LATENZ\u003C/div>\u003Cdiv class=\"bd-val\" id=\"bd-lat\">—\u003C/div>\u003Cdiv class=\"bd-note\">ms\u003C/div>\u003C/div>\n    \u003C/div>\n    \u003Cdiv id=\"bdetail-spark-lbl\">VERLAUF · LETZTE 60 SEKUNDEN\u003C/div>\n    \u003Ccanvas id=\"bdetail-spark\">\u003C/canvas>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ RADAR OVERLAY ════════════════════════════ -->\n\u003Cdiv id=\"radar-overlay\">\n  \u003Cdiv class=\"ro-hdr\">\n    \u003Cdiv class=\"ro-title\">RADAR · NETZWERKE\u003C/div>\n    \u003Cbutton class=\"sx\" onclick=\"closeRadar()\">✕\u003C/button>\n  \u003C/div>\n  \u003Ccanvas id=\"radar-canvas\">\u003C/canvas>\n  \u003Cdiv id=\"radar-list\">\u003C/div>\n\u003C/div>\n\n\u003C!-- ════ HISTORY OVERLAY ══════════════════════════ -->\n\u003Cdiv id=\"history-overlay\">\n  \u003Cdiv class=\"ho-hdr\">\n    \u003Cdiv class=\"ho-title\">VERLAUF · SIGNAL\u003C/div>\n    \u003Cbutton class=\"sx\" onclick=\"closeHistory()\">✕\u003C/button>\n  \u003C/div>\n  \u003Ccanvas id=\"history-canvas\">\u003C/canvas>\n  \u003Cdiv id=\"history-stats\">\n    \u003Cdiv class=\"hs-card\">\u003Cdiv class=\"hs-lbl\">MIN\u003C/div>\u003Cdiv class=\"hs-val\" id=\"hs-min\">—\u003C/div>\u003Cdiv class=\"hs-unit\">dBm\u003C/div>\u003C/div>\n    \u003Cdiv class=\"hs-card\">\u003Cdiv class=\"hs-lbl\">MITTEL\u003C/div>\u003Cdiv class=\"hs-val\" id=\"hs-avg\">—\u003C/div>\u003Cdiv class=\"hs-unit\">dBm\u003C/div>\u003C/div>\n    \u003Cdiv class=\"hs-card\">\u003Cdiv class=\"hs-lbl\">MAX\u003C/div>\u003Cdiv class=\"hs-val\" id=\"hs-max\">—\u003C/div>\u003Cdiv class=\"hs-unit\">dBm\u003C/div>\u003C/div>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ COMPASS OVERLAY ══════════════════════════ -->\n\u003Cdiv id=\"compass-overlay\">\n  \u003Cbutton class=\"comp-close-btn\" onclick=\"closeCompass()\">✕\u003C/button>\n  \u003Ccanvas id=\"compass-canvas\">\u003C/canvas>\n  \u003Cdiv class=\"comp-info\">\n    \u003Cdiv class=\"comp-label\">BESTE RICHTUNG\u003C/div>\n    \u003Cdiv class=\"comp-val\" id=\"comp-dir\">—\u003C/div>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ SETTINGS ═════════════════════════════════ -->\n\u003Cdiv id=\"settings\">\n  \u003Cdiv class=\"sh\">\n    \u003Cdiv class=\"st\">EINSTELLUNGEN\u003C/div>\n    \u003Cbutton class=\"sx\" onclick=\"closeSettings()\">✕\u003C/button>\n  \u003C/div>\n  \u003Cdiv class=\"ss\">\n    \u003Cdiv class=\"sst\">DARSTELLUNG\u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Partikel-Effekte\u003C/div>\u003Cdiv class=\"srs\">Hintergrundanimation aktiv\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-particles\" checked/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Signal-Heatmap\u003C/div>\u003Cdiv class=\"srs\">Farbige Karte auf Canvas\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-heatmap\" checked/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Bubble Labels\u003C/div>\u003Cdiv class=\"srs\">SSID-Namen anzeigen\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-labels\" checked/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Bubble-Größe\u003C/div>\u003Cdiv class=\"srs\">Größe der Netzwerk-Blasen\u003C/div>\u003C/div>\n    \u003C/div>\n    \u003Cinput type=\"range\" class=\"srange\" id=\"set-bubblesize\" min=\"0.5\" max=\"2\" step=\"0.1\" value=\"1\"/>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Scan-Geschwindigkeit\u003C/div>\u003Cdiv class=\"srs\">Aktualisierungsrate\u003C/div>\u003C/div>\n    \u003C/div>\n    \u003Cinput type=\"range\" class=\"srange\" id=\"set-scanrate\" min=\"500\" max=\"5000\" step=\"500\" value=\"2000\"/>\n  \u003C/div>\n  \u003Cdiv class=\"ss\">\n    \u003Cdiv class=\"sst\">AUDIO\u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Sound-Effekte\u003C/div>\u003Cdiv class=\"srs\">Klicks und Benachrichtigungen\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-sound\" checked/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Hintergrundmusik\u003C/div>\u003Cdiv class=\"srs\">Atmosphärischer Loop\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-bgmusic\"/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n  \u003C/div>\n  \u003Cdiv class=\"ss\">\n    \u003Cdiv class=\"sst\">DATEN\u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">GPS-Tracking\u003C/div>\u003Cdiv class=\"srs\">Signalpfad aufzeichnen\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-gps\" checked/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n    \u003Cdiv class=\"sr\">\n      \u003Cdiv>\u003Cdiv class=\"srl\">Verlauf speichern\u003C/div>\u003Cdiv class=\"srs\">Letzte 5 Minuten\u003C/div>\u003C/div>\n      \u003Clabel class=\"tog\">\u003Cinput type=\"checkbox\" id=\"set-history\" checked/>\u003Cdiv class=\"tog-t\">\u003C/div>\u003Cdiv class=\"tog-k\">\u003C/div>\u003C/label>\n    \u003C/div>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ════ INFO ══════════════════════════════════════ -->\n\u003Cdiv id=\"info-overlay\">\n  \u003Cdiv class=\"io-hdr\">\n    \u003Cdiv class=\"io-title\">WIPULSCAN PRO\u003C/div>\n    \u003Cbutton class=\"sx\" onclick=\"closeInfo()\">✕\u003C/button>\n  \u003C/div>\n  \u003Cdiv class=\"io-sec\">\n    \u003Cdiv class=\"io-sec-title\">VERSION 6.0 · NEU\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">🗺\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">Signal-Heatmap\u003C/div>\u003Cdiv class=\"io-item-desc\">Echtzeit-Farbkarte der Signalstärke auf dem Bildschirm.\u003C/div>\u003C/div>\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">📡\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">Radar-View\u003C/div>\u003Cdiv class=\"io-item-desc\">Alle gefundenen Netzwerke im Radar-Display mit Stärke-Balken.\u003C/div>\u003C/div>\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">📊\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">Verlaufs-Chart\u003C/div>\u003Cdiv class=\"io-item-desc\">Signalstärke über die Zeit mit Min/Avg/Max-Statistiken.\u003C/div>\u003C/div>\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">🧭\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">Signal-Kompass\u003C/div>\u003Cdiv class=\"io-item-desc\">Zeigt die beste Richtung für optimalen Empfang.\u003C/div>\u003C/div>\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">✨\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">Mini-Sparklines\u003C/div>\u003Cdiv class=\"io-item-desc\">Jede Metrikkarte zeigt ihren eigenen Mini-Verlauf.\u003C/div>\u003C/div>\u003C/div>\n  \u003C/div>\n  \u003Cdiv class=\"io-sec\">\n    \u003Cdiv class=\"io-sec-title\">FEATURES\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">🌐\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">NetworkInformation API\u003C/div>\u003Cdiv class=\"io-item-desc\">Echtzeit-Daten: Download, Upload, Latenz, Verbindungstyp.\u003C/div>\u003C/div>\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">📍\u003C/div>\u003Cdiv class=\"io-body\">\u003Cdiv class=\"io-item-title\">GPS-Signalpfad\u003C/div>\u00 n#bdetail-name{font-family:var(--font-ui);font-size:16px;font-weight:700;letter-spacing:.1em;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#bdetail-dbm{font-family:var(--font-data);font-size:9px;color:rgba(255,255,255,.3);margin-top:4px;}\n.bd-close{width:32px;height:32px;border-radius:50%;\n  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);\n  color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;\n  display:flex;align-items:center;justify-content:center;}\n#bdetail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}\n.bd-cell{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);\n  border-radius:12px;padding:10px 12px;}\n.bd-lbl{font-family:var(--font-data);font-size:7px;letter-spacing:.22em;\n  color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:5px;}\n.bd-val{font-family:var(--font-data);font-size:16px;font-weight:700;color:var(--gold);}\n.bd-note{font-size:8px;color:rgba(255,255,255,.25);margin-top:3px;}\n#bdetail-spark{width:100%;height:52px;display:block;border-radius:8px;margin-top:8px;}\n\n/* ── RADAR OVERLAY ───────────────────────────────── */\n#radar-overlay{position:fixed;inset:0;z-index:4000;\n  background:rgba(0,0,10,.97);display:none;flex-direction:column;align-items:center;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+20px);overflow-y:auto;}\n#radar-overlay.open{display:flex;}\n.ov-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;\n  margin-bottom:20px;padding-top:16px;}\n.ov-title{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  background:linear-gradient(90deg,#00cfff,#00ff88);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n#radar-cv{width:min(320px,88vw);height:min(320px,88vw);display:block;\n  border-radius:50%;border:1px solid rgba(0,255,136,.14);\n  background:radial-gradient(circle,rgba(0,18,6,.7) 0%,rgba(0,6,2,.95) 100%);margin:0 auto 20px;}\n#radar-list{width:100%;max-width:500px;}\n.rl-item{display:flex;align-items:center;justify-content:space-between;\n  padding:11px 14px;border-radius:14px;margin-bottom:8px;\n  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:all .2s;}\n.rl-item:hover{border-color:rgba(0,207,255,.3);background:rgba(0,207,255,.04);}\n.rl-ssid{font-family:var(--font-ui);font-size:13px;font-weight:600;color:rgba(255,255,255,.84);}\n.rl-meta{font-family:var(--font-data);font-size:8.5px;color:rgba(255,255,255,.3);margin-top:2px;}\n.rl-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}\n.rl-dbm{font-family:var(--font-data);font-size:12px;font-weight:700;}\n.rl-bar-wrap{width:72px;height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;}\n.rl-bar{height:100%;border-radius:3px;transition:width .5s;}\n\n/* ── HISTORY OVERLAY ──────────────────────────────── */\n#history-overlay{position:fixed;inset:0;z-index:4000;background:rgba(0,0,10,.97);\n  display:none;flex-direction:column;padding:calc(var(--st)+16px) 20px calc(var(--sb)+20px);overflow-y:auto;}\n#history-overlay.open{display:flex;}\n#hist-cv{width:100%;height:220px;display:block;border-radius:14px;\n  border:1px solid rgba(255,255,255,.07);background:rgba(4,4,16,.8);}\n#hist-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}\n.hs-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);\n  border-radius:14px;padding:12px 10px;text-align:center;}\n.hs-lbl{font-family:var(--font-data);font-size:7px;letter-spacing:.24em;\n  color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:5px;}\n.hs-val{font-family:var(--font-data);font-size:20px;font-weight:700;color:var(--gold);}\n.hs-unit{font-size:8px;color:rgba(255,255,255,.25);margin-top:3px;}\n\n/* ── SETTINGS ─────────────────────────────────────── */\n#settings{position:fixed;inset:0;z-index:5000;\n  background:rgba(0,0,10,.98);display:none;flex-direction:column;overflow-y:auto;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+24px);}\n#settings.open{display:flex;}\n.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-top:16px;}\n.st{font-family:var(--font-ui);font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;\n  background:linear-gradient(90deg,var(--gold-lt),var(--gold));\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n.sx{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.12);\n  background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;\n  display:flex;align-items:center;justify-content:center;transition:all .2s;}\n.sx:hover{border-color:rgba(212,175,55,.4);color:var(--gold);}\n.ss{margin-bottom:22px;}\n.sst{font-family:var(--font-data);font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.25);\n  text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px;}\n.sr{display:flex;align-items:center;justify-content:space-between;\n  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);}\n.srl{font-size:13px;color:rgba(255,255,255,.7);}\n.srs{font-size:9.5px;color:rgba(255,255,255,.28);margin-top:2px;}\n.tog{position:relative;width:44px;height:24px;flex-shrink:0;}\n.tog input{opacity:0;width:0;height:0;}\n.tog-t{position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,.08);\n  border:1px solid rgba(255,255,255,.12);cursor:pointer;transition:background .25s;}\n.tog input:checked+.tog-t{background:rgba(212,175,55,.3);border-color:var(--gold);}\n.tog-k{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;\n  background:rgba(255,255,255,.5);transition:transform .25s,background .25s;pointer-events:none;}\n.tog input:checked~.tog-k{transform:translateX(20px);background:var(--gold);}\n.srange{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;\n  background:rgba(255,255,255,.12);outline:none;margin:8px 0;}\n.srange::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;\n  background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(212,175,55,.5);}\n\n/* ── INFO OVERLAY ─────────────────────────────────── */\n#info-overlay{position:fixed;inset:0;z-index:6000;background:rgba(0,0,10,.99);\n  display:none;flex-direction:column;overflow-y:auto;\n  padding:calc(var(--st)+16px) 20px calc(var(--sb)+24px);}\n#info-overlay.open{display:flex;}\n.io-sec{margin-bottom:24px;}\n.io-sec-title{font-family:var(--font-data);font-size:8px;letter-spacing:.28em;color:rgba(255,255,255,.28);\n  text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:14px;}\n.io-item{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.03);}\n.io-icon{font-size:20px;width:30px;flex-shrink:0;text-align:center;line-height:1.4;}\n.io-item-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:4px;}\n.io-item-desc{font-size:11px;color:rgba(255,255,255,.38);line-height:1.7;}\n\n/* ── GPS DIALOG ─────────────────────────────────── */\n#gps-permit{position:fixed;inset:0;z-index:4500;\n  background:rgba(0,0,10,.92);backdrop-filter:blur(12px);\n  display:none;align-items:center;justify-content:center;}\n#gps-permit.open{display:flex;}\n#gps-card{background:rgba(0,12,28,0.85);backdrop-filter:blur(24px);\n  border:1px solid rgba(0,200,255,.2);border-radius:24px;\n  padding:32px 28px 24px;max-width:320px;width:90%;text-align:center;\n  box-shadow:0 0 60px rgba(0,180,255,.1),0 30px 80px rgba(0,0,0,.8);}\n#gps-card-icon{font-size:42px;margin-bottom:18px;display:block;\n  filter:drop-shadow(0 0 18px rgba(0,180,255,.6));}\n#gps-card-title{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.3em;\n  color:rgba(0,220,255,.92);margin-bottom:12px;}\n#gps-card-desc{font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,.38);\n  line-height:1.75;margin-bottom:26px;}\n#gps-card-desc b{color:rgba(0,220,255,.65);}\n#gps-grant{width:100%;padding:14px;margin-bottom:12px;\n  background:rgba(0,180,255,.09);border:1px solid rgba(0,180,255,.38);border-radius:26px;\n  color:rgba(0,220,255,.92);font-family:var(--font-ui);font-size:9px;font-weight:700;\n  letter-spacing:.24em;cursor:pointer;transition:background .2s;}\n#gps-grant:active{background:rgba(0,180,255,.2);}\n#gps-skip{background:none;border:none;color:rgba(255,255,255,.2);\n  font-family:var(--font-data);font-size:8px;letter-spacing:.12em;cursor:pointer;padding:8px;}\n\n/* ── TAP TO START ────────────────────────────────── */\n#tap-start{position:fixed;inset:0;z-index:9500;background:#000006;\n  display:none;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;}\n#tap-start-logo{font-family:var(--font-ui);font-size:clamp(36px,10vw,64px);font-weight:700;\n  letter-spacing:.16em;text-transform:uppercase;\n  background:linear-gradient(150deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);\n  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;}\n#tap-start-hint{font-family:var(--font-data);font-size:clamp(9px,2.2vw,12px);letter-spacing:.4em;\n  color:rgba(212,175,55,.45);text-transform:uppercase;margin-bottom:60px;}\n#tap-start-orb{width:clamp(78px,20vw,100px);height:clamp(78px,20vw,100px);border-radius:50%;\n  background:radial-gradient(ellipse at 38% 32%,rgba(245,224,112,.1) 0%,rgba(0,0,10,.98) 70%);\n  border:1px solid rgba(212,175,55,.26);\n  display:flex;align-items:center;justify-content:center;\n  font-size:clamp(30px,8vw,42px);animation:tap-pulse 2.3s ease-in-out infinite;}\n@keyframes tap-pulse{\n  0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.3),0 0 28px rgba(212,175,55,.09);}\n  50%{box-shadow:0 0 0 24px rgba(212,175,55,0),0 0 48px rgba(212,175,55,.22);}\n}\n#tap-start-label{font-family:var(--font-data);font-size:clamp(8px,2vw,10px);letter-spacing:.34em;\n  color:rgba(212,175,55,.3);text-transform:uppercase;margin-top:26px;}\n\n/* ── PWA INSTALL ──────────────────────────────────── */\n#pwa-install{position:fixed;bottom:calc(var(--sb)+16px);right:16px;z-index:200;\n  display:none;align-items:center;gap:9px;padding:11px 18px 11px 13px;\n  border-radius:28px;border:1px solid rgba(212,175,55,.32);\n  background:rgba(0,0,16,.9);backdrop-filter:blur(16px);\n  cursor:pointer;opacity:0;transform:translateY(14px) scale(.93);}\n#pwa-install.visible{display:flex;\n  animation:pwa-in .85s cubic-bezier(.22,1,.36,1) forwards;}\n@keyframes pwa-in{0%{opacity:0;transform:translateY(14px) scale(.93);}\n  60%{opacity:1;transform:translateY(-4px) scale(1.05);}100%{opacity:1;transform:none;}}\n.pwa-icon{font-size:20px;}.pwa-lbl{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}\n.pwa-sub{font-family:var(--font-data);font-size:8px;color:rgba(255,255,255,.35);margin-top:2px;}\n\n::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}\n::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;}\n\u003C/style>\n\u003C/head>\n\u003Cbody>\n\n\u003C!-- ══ INTRO ═══════════════════════════════════════ -->\n\u003Cdiv id=\"intro\">\n  \u003Ccanvas id=\"icv\">\u003C/canvas>\n  \u003Cdiv id=\"intro-flash\">\u003C/div>\n  \u003Cdiv id=\"il-pre\" class=\"il\">COBRA DYNAMICS PRESENTS\u003C/div>\n  \u003Cdiv id=\"il-brand\">WIPULSCAN\u003C/div>\n  \u003Cdiv id=\"il-sub\" class=\"il\">PRO EDITION · v6.0\u003C/div>\n  \u003Cdiv id=\"il-desc\" class=\"il\">Spatial WiFi Signal Scanner &amp; Organic Heatmap\u003C/div>\n  \u003Cdiv id=\"intro-bar-wrap\">\u003Cdiv id=\"intro-bar\">\u003C/div>\u003C/div>\n  \u003Cdiv id=\"intro-pct\">0%\u003C/div>\n  \u003Cdiv id=\"intro-foot\">© Cobra Dynamics 2026 · Dennis Stein &amp; Christoph Frick · Langen, Germany\u003C/div>\n\u003C/div>\n\n\u003C!-- ══ CONSENT ═══════════════════════════════════════ -->\n\u003Cdiv id=\"consent\">\n  \u003Cdiv class=\"cc\">\n    \u003Cdiv class=\"cc-logo\">WIPULSCAN PRO\u003C/div>\n    \u003Cdiv class=\"cc-by\">Cobra Dynamics · v6.0 · 2026\u003C/div>\n    \u003Cdiv class=\"lang-row\">\n      \u003Cbutton class=\"lb on\" data-lang=\"de\" onclick=\"setLang('de')\">DE\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"en\" onclick=\"setLang('en')\">EN\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"zh\" onclick=\"setLang('zh')\">中文\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"es\" onclick=\"setLang('es')\">ES\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"fr\" onclick=\"setLang('fr')\">FR\u003C/button>\n      \u003Cbutton class=\"lb\" data-lang=\"ru\" onclick=\"setLang('ru')\">РУ\u003C/button>\n    \u003C/div>\n    \u003Cdiv class=\"cc-h\" id=\"c-eye\">\u003C/div>\n    \u003Cdiv class=\"cc-p\" id=\"c-sub\">\u003C/div>\n    \u003Cdiv class=\"legal\" id=\"c-leg\">\u003C/div>\n    \u003Cdiv class=\"chk-row\">\n      \u003Cinput type=\"checkbox\" id=\"chk\" onchange=\"document.getElementById('cta').disabled=!this.checked\"/>\n      \u003Clabel for=\"chk\" id=\"c-chk\">\u003C/label>\n    \u003C/div>\n    \u003Cbutton class=\"cta\" id=\"cta\" disabled onclick=\"acceptConsent()\">\u003C/button>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ══ GPS DIALOG ═════════════════════════════════════ -->\n\u003Cdiv id=\"gps-permit\">\n  \u003Cdiv id=\"gps-card\">\n    \u003Cspan id=\"gps-card-icon\">📍\u003C/span>\n    \u003Cdiv id=\"gps-card-title\">STANDORT · GPS\u003C/div>\n    \u003Cdiv id=\"gps-card-desc\">WIPULSCAN benötigt deinen Standort um den \u003Cb>Signalpfad\u003C/b> aufzuzeichnen und die \u003Cb>beste Richtung\u003C/b> für optimalen Empfang zu zeigen.\u003C/div>\n    \u003Cbutton id=\"gps-grant\" onclick=\"requestGPS()\">📍 STANDORT FREIGEBEN\u003C/button>\n    \u003Cbutton id=\"gps-skip\" onclick=\"skipGPS()\">Überspringen\u003C/button>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ══ TAP TO START ═══════════════════════════════════ -->\n\u003Cdiv id=\"tap-start\" onclick=\"tapToStart()\">\n  \u003Cdiv id=\"tap-start-logo\">WIPULSCAN\u003C/div>\n  \u003Cdiv id=\"tap-start-hint\">PRO EDITION · v6.0\u003C/div>\n  \u003Cdiv id=\"tap-start-orb\">📡\u003C/div>\n  \u003Cdiv id=\"tap-start-label\">TIPPEN ZUM STARTEN\u003C/div>\n\u003C/div>\n\n\u003C!-- ══ MAIN APP ═══════════════════════════════════════ -->\n\u003Cdiv id=\"app\">\n  \u003C!-- WebGL Heatmap Background -->\n  \u003Ccanvas id=\"glcv\">\u003C/canvas>\n  \u003C!-- 2D Overlay (particles, bubbles, path) -->\n  \u003Ccanvas id=\"cv\">\u003C/canvas>\n\n  \u003C!-- TOPBAR -->\n  \u003Cdiv id=\"topbar\">\n    \u003Cdiv id=\"tb-logo\">WIPULSCAN\u003C/div>\n    \u003Cdiv id=\"tb-right\">\n      \u003Cdiv id=\"tb-conn\">—\u003C/div>\n      \u003Cdiv id=\"tb-clock\">--:--:--\u003C/div>\n    \u003C/div>\n  \u003C/div>\n\n  \u003C!-- SSID BADGE -->\n  \u003Cdiv id=\"badge\">\u003Cdiv id=\"badge-inner\">—\u003C/div>\u003C/div>\n\n  \u003C!-- SIGNAL LEGEND -->\n  \u003Cdiv id=\"sig-legend\">\n    \u003Cdiv class=\"sl-tick\" style=\"color:rgba(0,255,136,.7)\">-30\u003C/div>\n    \u003Cdiv id=\"sig-legend-bar\">\n      \u003Cdiv class=\"sl-tick-line\" style=\"top:0\">\u003C/div>\n      \u003Cdiv class=\"sl-tick-line\" style=\"top:40px\">\u003C/div>\n      \u003Cdiv class=\"sl-tick-line\" style=\"top:80px\">\u003C/div>\n      \u003Cdiv class=\"sl-tick-line\" style=\"top:120px\">\u003C/div>\n      \u003Cdiv class=\"sl-tick-line\" style=\"top:158px\">\u003C/div>\n    \u003C/div>\n    \u003Cdiv class=\"sl-tick\" style=\"color:rgba(255,34,68,.7)\">-90\u003C/div>\n  \u003C/div>\n\n  \u003C!-- ACTION BUTTONS -->\n  \u003Cdiv class=\"fab\" id=\"f-set\" onclick=\"openSettings()\">⚙\u003C/div>\n  \u003Cdiv class=\"fab\" id=\"info-btn\" onclick=\"openInfo()\">?\u003C/div>\n  \u003C!-- RADAR + HISTORY buttons positioned below topbar -->\n  \u003Cdiv class=\"fab\" id=\"radar-btn\" onclick=\"openRadar()\" style=\"display:none;\">📡\u003C/div>\n  \u003Cdiv class=\"fab\" id=\"hist-btn\" onclick=\"openHistory()\" style=\"display:none;\">📊\u003C/div>\n\n  \u003C!-- STATUS MSG -->\n  \u003Cdiv id=\"smsg\">\u003C/div>\n\n  \u003C!-- FILTER BAR -->\n  \u003Cdiv id=\"filterbar\">\u003C/div>\n\n  \u003C!-- SCAN BUTTON (Orb) -->\n  \u003Cbutton id=\"scan-btn\" onclick=\"toggleScan()\">\n    \u003Cdiv id=\"orb-ring\">\u003C/div>\n    \u003Cdiv id=\"orb-outer\">\u003C/div>\n    \u003Ccanvas id=\"orb-cv\">\u003C/canvas>\n    \u003Cdiv id=\"orb-glass\">\u003C/div>\n    \u003Cdiv id=\"orb-data\">\n      \u003Cspan id=\"orb-icon\">📡\u003C/span>\n      \u003Cdiv id=\"orb-val\">—\u003C/div>\n      \u003Cdiv id=\"orb-unit\">MBPS\u003C/div>\n      \u003Cdiv id=\"orb-dbm\">— dBm\u003C/div>\n    \u003C/div>\n    \u003Cspan id=\"btn-lbl\">SCAN STARTEN\u003C/span>\n  \u003C/button>\n\n  \u003C!-- METRICS BAR -->\n  \u003Cdiv id=\"metrics\">\n    \u003Cdiv class=\"mgrid\">\n      \u003Cdiv class=\"mc\" id=\"mc-sig\" onclick=\"openHistory()\">\n        \u003Cdiv class=\"ml\">SIGNAL\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-sig\">—\u003C/div>\n        \u003Cdiv class=\"mu\">dBm\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"sp-sig\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-dl\" onclick=\"openHistory()\">\n        \u003Cdiv class=\"ml\">DOWNLOAD\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-dl\">—\u003C/div>\n        \u003Cdiv class=\"mu\">Mbps\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"sp-dl\">\u003C/canvas>\n      \u003C/div>\n      \u003Cdiv class=\"mc\" id=\"mc-ul\">\n        \u003Cdiv class=\"ml\">UPLOAD\u003C/div>\n        \u003Cdiv class=\"mv\" id=\"mv-ul\">—\u003C/div>\n        \u003Cdiv class=\"mu\">Mbps\u003C/div>\n        \u003Ccanvas class=\"mc-spark\" id=\"sp-u 003C/div>\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">📊\u003C/div>\u003Cdiv>\u003Cdiv class=\"io-item-title\">Signal-Verlaufs-Chart\u003C/div>\u003Cdiv class=\"io-item-desc\">Min / Avg / Max Statistiken über die Zeit.\u003C/div>\u003C/div>\u003C/div>\n  \u003C/div>\n  \u003Cdiv class=\"io-sec\">\n    \u003Cdiv class=\"io-sec-title\">ÜBER\u003C/div>\n    \u003Cdiv class=\"io-item\">\u003Cdiv class=\"io-icon\">🐍\u003C/div>\u003Cdiv>\u003Cdiv class=\"io-item-title\">Cobra Dynamics\u003C/div>\u003Cdiv class=\"io-item-desc\">Dennis Stein &amp; Christoph Frick · Nördliche Ringstraße 75 · 63225 Langen · 2026\u003C/div>\u003C/div>\u003C/div>\n  \u003C/div>\n\u003C/div>\n\n\u003C!-- ══ TOAST ══════════════════════════════════════════ -->\n\u003Cdiv id=\"toast\">\u003C/div>\n\u003C!-- ══ PWA ════════════════════════════════════════════ -->\n\u003Cdiv id=\"pwa-install\" onclick=\"installPWA()\">\n  \u003Cdiv class=\"pwa-icon\">📲\u003C/div>\n  \u003Cdiv>\u003Cdiv class=\"pwa-lbl\">APP INSTALLIEREN\u003C/div>\u003Cdiv class=\"pwa-sub\">Offline verfügbar\u003C/div>\u003C/div>\n\u003C/div>\n\n\u003Cscript>\n/* ══════════════════════════════════════════════════════════\n   WIPULSCAN PRO v6.0 — MAIN SCRIPT\n   WebGL Organic Heatmap Orb + Glassmorphism UI\n══════════════════════════════════════════════════════════ */\n\n/* ── i18n ─────────────────────────────────────────────── */\nconst I18N = {\n  de:{\n    eye:\"🔥 Deine Verbindung lebt\",\n    sub:\"WIPULSCAN PRO visualisiert dein WiFi als organische Heatmap — in Echtzeit auf deinem Gerät.\",\n    leg:\"WIPULSCAN PRO v6.0\\n© Cobra Dynamics 2026\\nDennis Stein & Christoph Frick · 63225 Langen\\n\\nDiese App verwendet die Browser-NetworkInformation API. Keine Daten werden gespeichert oder übertragen. GPS-Daten verbleiben lokal.\\n\\nMit der Nutzung stimmst du unserer Datenschutzerklärung zu.\",\n    chk:\"Ich habe die Nutzungsbedingungen gelesen und akzeptiere sie.\",\n    cta:\"APP STARTEN\",\n    scann
