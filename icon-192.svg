<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000022"/>
      <stop offset="100%" stop-color="#000010"/>
    </linearGradient>
    <linearGradient id="gold" x1="96" y1="40" x2="96" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5e070"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="70%" stop-color="#7a5c10"/>
      <stop offset="100%" stop-color="#3a2800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners (maskable safe zone) -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="192" height="192" rx="38" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="2"/>
  <!-- WiFi arcs (filter: glow) -->
  <g filter="url(#glow)">
    <!-- Outer arc -->
    <path d="M32 98 A64 64 0 0 1 160 98"
      fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
    <!-- Mid arc -->
    <path d="M54 98 A42 42 0 0 1 138 98"
      fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
    <!-- Inner arc -->
    <path d="M76 98 A20 20 0 0 1 116 98"
      fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    <!-- Dot -->
    <circle cx="96" cy="128" r="10" fill="url(#gold)"/>
    <!-- Dot sheen -->
    <ellipse cx="92" cy="124" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)" transform="rotate(-15,92,124)"/>
  </g>
  <!-- Bottom text -->
  <text x="96" y="168" font-family="sans-serif" font-size="11" font-weight="700"
    fill="rgba(212,175,55,0.6)" text-anchor="middle" letter-spacing="4">PRO</text>
</svg>
